<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace Workspace</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo"><span>⚡</span><div>Ace<small>Multiplayer Agent Workspace</small></div></div>
    <div class="sidebar-section">
      <h3>Dashboard</h3>
      <div class="session-item active" onclick="showDashboard()" id="nav-dashboard">🏠 Home</div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <h3>Sessions</h3>
      <div id="session-list"></div>
      <div class="new-session-btn" onclick="showNewSessionModal()">+ New Session</div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;padding:4px 8px">
        <div class="avatar" style="width:24px;height:24px;font-size:10px;background:var(--accent)">S</div>
        <span style="font-size:12px" id="user-name">Setting up...</span>
      </div>
    </div>
  </div>
  <div class="main" id="main-content">
    <!-- Dynamic content -->
  </div>
</div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let state = { sessions: [], activeSession: null, userId: null, userName: '', ws: null, messages: {}, dashboard: true, activeTab: 'chat', termWs: null };
const API = '';

async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: {'Content-Type':'application/json',...opts.headers}, ...opts });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

function uid() { return Math.random().toString(36).slice(2, 10); }

// ─── WebSocket ───────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  state.ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'message') {
      if (!state.messages[msg.message.sessionId]) state.messages[msg.message.sessionId] = [];
      state.messages[msg.message.sessionId].push(msg.message);
      if (state.activeSession === msg.message.sessionId && !state.dashboard) appendMessage(msg.message);
    }
    if (msg.type === 'session_created' || msg.type === 'session_updated' || msg.type === 'session_deleted') {
      loadSessions();
    }
  };
  state.ws.onclose = () => setTimeout(connectWS, 3000);
}

// ─── User Setup ──────────────────────────────────────────
async function setupUser() {
  const name = localStorage.getItem('ace_user_name') || prompt('Your name:') || 'User';
  localStorage.setItem('ace_user_name', name);
  state.userName = name;
  const user = await api('/api/users', { method: 'POST', body: JSON.stringify({ name }) });
  state.userId = user.id;
  document.getElementById('user-name').textContent = name;
}

// ─── Sessions ────────────────────────────────────────────
async function loadSessions() {
  const data = await api('/api/sessions');
  state.sessions = data.sessions;
  renderSessionList();
}

function renderSessionList() {
  const el = document.getElementById('session-list');
  el.innerHTML = state.sessions.map(s => `
    <div class="session-item ${state.activeSession === s.id ? 'active' : ''}" onclick="openSession('${s.id}')">
      <div class="dot ${s.agentRunning ? 'running' : 'idle'}"></div>
      <span>${s.name}</span>
      <span class="count">${s.messageCount || 0}</span>
    </div>
  `).join('');
}

async function openSession(id) {
  state.activeSession = id;
  state.dashboard = false;
  renderSessionList();

  // Join WS
  if (state.ws?.readyState === 1) {
    state.ws.send(JSON.stringify({ type: 'join', sessionId: id, userId: state.userId, userName: state.userName }));
  }

  const data = await api(`/api/sessions/${id}`);
  state.messages[id] = data.messages || [];

  const main = document.getElementById('main-content');
  const s = data;
  main.innerHTML = `
    <div class="session-header">
      <h2>
        # ${s.name}
        <span class="branch">${s.branch}</span>
        ${s.agentRunning ? '<span style="color:var(--green);font-size:12px">● Agent running</span>' : ''}
      </h2>
      <div class="header-actions">
        <button class="btn ${getActiveTab()==='chat'?'active':''}" onclick="switchTab('chat')">💬 Chat</button>
        <button class="btn ${getActiveTab()==='terminal'?'active':''}" onclick="switchTab('terminal')">⌨ Terminal</button>
        <button class="btn ${getActiveTab()==='files'?'active':''}" onclick="switchTab('files')">📁 Files</button>
        <button class="btn ${getActiveTab()==='git'?'active':''}" onclick="switchTab('git')">🔀 Git</button>
        <button class="btn ${getActiveTab()==='plan'?'active':''}" onclick="switchTab('plan')">📋 Plan</button>
        <button class="btn ${getActiveTab()==='preview'?'active':''}" onclick="switchTab('preview')">👁 Preview</button>
        <button class="btn btn-primary" onclick="promptAgent()">🤖 Agent</button>
      </div>
    </div>
    ${s.summary ? `<div class="summary-block"><span class="label">Last:</span> ${s.summary}</div>` : ''}
    <div id="session-content" style="flex:1;display:flex;flex-direction:column;min-height:0">
    <div class="chat-area" id="chat-area"></div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="chat-input" placeholder="Message this session, or type @ace to prompt the agent..." rows="1" 
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
          onkeydown="handleInputKey(event)"></textarea>
        <div class="input-actions">
          <select class="model-select" id="model-select">
            <option value="opus">Opus</option>
            <option value="sonnet">Sonnet</option>
            <option value="haiku">Haiku</option>
          </select>
          <button class="send-btn" onclick="sendChat()" title="Send">▶</button>
        </div>
      </div>
    </div>
    </div>
  `;

  // Render messages
  const chat = document.getElementById('chat-area');
  state.messages[id].forEach(m => appendMessage(m, false));
  chat.scrollTop = chat.scrollHeight;
}

function appendMessage(m, scroll = true) {
  const chat = document.getElementById('chat-area');
  if (!chat) return;

  const avatarEmoji = {
    system: '⚡', agent: '🤖', terminal: '⌨',
  }[m.type] || '👤';

  const contentClass = {
    agent_start: '', agent_stream: 'agent', agent_done: '',
    terminal: 'terminal', system: 'system',
  }[m.type] || '';

  const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:${m.type.includes('agent') ? 'var(--accent2)' : m.type === 'system' ? 'var(--text-dim)' : 'var(--text)'}">${m.userName}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-content ${contentClass}">${escHtml(m.content)}</div>
    </div>
  `;
  chat.appendChild(div);
  if (scroll) chat.scrollTop = chat.scrollHeight;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  if (e.key === '/' && e.target.value === '') { e.preventDefault(); promptAgent(); }
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !state.activeSession) return;

  // If starts with /agent, prompt the agent
  if (text.startsWith('/agent ')) {
    const prompt = text.slice(7);
    promptAgentWithText(prompt);
    input.value = '';
    input.style.height = 'auto';
    return;
  }

  // Regular chat
  state.ws.send(JSON.stringify({
    type: 'chat', sessionId: state.activeSession, userId: state.userId,
    userName: state.userName, content: text,
  }));
  input.value = '';
  input.style.height = 'auto';
}

function promptAgent() {
  document.getElementById('modal-content').innerHTML = `
    <h2>🤖 Prompt Agent</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px">The agent will read the full conversation as context.</p>
    <div class="form-group">
      <label>What should the agent do?</label>
      <input type="text" id="agent-prompt" placeholder="Add a dark mode toggle to the navbar..." autofocus
        onkeydown="if(event.key==='Enter')runAgent()">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="runAgent()">🚀 Run Agent</button>
    </div>
  `;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('agent-prompt')?.focus(), 100);
}

function promptAgentWithText(prompt) {
  const model = document.getElementById('model-select')?.value || 'opus';
  api(`/api/sessions/${state.activeSession}/agent`, {
    method: 'POST',
    body: JSON.stringify({ prompt, userId: state.userId, model }),
  });
  closeModal();
}

function runAgent() {
  const prompt = document.getElementById('agent-prompt')?.value;
  if (!prompt) return;
  promptAgentWithText(prompt);
}

function showTerminalModal() {
  document.getElementById('modal-content').innerHTML = `
    <h2>⌨ Run Command</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px">Execute a command in the session workspace.</p>
    <div class="form-group">
      <label>Command</label>
      <input type="text" id="term-cmd" placeholder="bun install && bun dev" autofocus
        onkeydown="if(event.key==='Enter')runTermCmd()">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="runTermCmd()">Run</button>
    </div>
  `;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('term-cmd')?.focus(), 100);
}

async function runTermCmd() {
  const cmd = document.getElementById('term-cmd')?.value;
  if (!cmd || !state.activeSession) return;
  closeModal();
  await api(`/api/sessions/${state.activeSession}/exec`, {
    method: 'POST',
    body: JSON.stringify({ command: cmd, userId: state.userId }),
  });
}

function showNewSessionModal() {
  document.getElementById('modal-content').innerHTML = `
    <h2>+ New Session</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px">Each session gets its own git branch and workspace.</p>
    <div class="form-group">
      <label>Session Name</label>
      <input type="text" id="new-session-name" placeholder="feature/auth-flow" autofocus
        onkeydown="if(event.key==='Enter')createSession()">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createSession()">Create</button>
    </div>
  `;
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('new-session-name')?.focus(), 100);
}

async function createSession() {
  const name = document.getElementById('new-session-name')?.value || 'New Session';
  const session = await api('/api/sessions', {
    method: 'POST',
    body: JSON.stringify({ name, userId: state.userId }),
  });
  closeModal();
  await loadSessions();
  openSession(session.id);
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

// ─── Dashboard ───────────────────────────────────────────
function showDashboard() {
  state.dashboard = true;
  state.activeSession = null;
  renderSessionList();

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="dashboard">
      <h1 style="font-size:22px;margin-bottom:20px">Welcome back, ${state.userName} 👋</h1>
      <div class="dash-grid">
        <div class="dash-card">
          <h3>🔄 Pick Up Where You Left Off</h3>
          <div id="pick-up-list"></div>
        </div>
        <div class="dash-card">
          <h3>📊 Active Sessions</h3>
          <div id="active-sessions"></div>
        </div>
        <div class="dash-card">
          <h3>🚀 Quick Start</h3>
          <div class="pick-up-item" onclick="showNewSessionModal()">
            <div class="icon">➕</div>
            <div class="info"><div class="name">New Session</div><div class="sub">Start a fresh workspace</div></div>
          </div>
          <div class="pick-up-item" onclick="openSessionIfExists()">
            <div class="icon">📂</div>
            <div class="info"><div class="name">Open Last Session</div><div class="sub">Continue where you stopped</div></div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Fill pick-up
  const pickup = document.getElementById('pick-up-list');
  const recent = state.sessions.filter(s => s.lastCommit).slice(-3);
  pickup.innerHTML = recent.length ? recent.map(s => `
    <div class="pick-up-item" onclick="openSession('${s.id}')">
      <div class="icon">📝</div>
      <div class="info"><div class="name">${s.name}</div><div class="sub">${s.lastCommit || 'No commits yet'}</div></div>
    </div>
  `).join('') : '<p style="color:var(--text-dim);font-size:13px;padding:10px">No sessions yet. Create one to get started.</p>';

  // Fill active
  const active = document.getElementById('active-sessions');
  active.innerHTML = state.sessions.length ? state.sessions.map(s => `
    <div class="pick-up-item" onclick="openSession('${s.id}')">
      <div class="dot ${s.agentRunning ? 'running' : 'idle'}" style="width:8px;height:8px"></div>
      <div class="info"><div class="name"># ${s.name}</div><div class="sub">${s.messageCount || 0} messages · ${s.participantCount || 0} people</div></div>
    </div>
  `).join('') : '<p style="color:var(--text-dim);font-size:13px;padding:10px">No active sessions.</p>';
}

function openSessionIfExists() {
  if (state.sessions.length > 0) openSession(state.sessions[state.sessions.length - 1].id);
}

// ─── Tab Switching ───────────────────────────────────────
let _activeTab = 'chat';
function getActiveTab() { return _activeTab; }
async function switchTab(tab) {
  _activeTab = tab;
  // Re-render header buttons
  document.querySelectorAll('.header-actions .btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.header-actions .btn');
  const tabMap = { chat: 0, terminal: 1, files: 2, git: 3, plan: 4, preview: 5 };
  if (tabMap[tab] !== undefined && btns[tabMap[tab]]) btns[tabMap[tab]].classList.add('active');

  const content = document.getElementById('session-content');
  if (!content) return;

  if (tab === 'chat') {
    content.style.display = '';
    document.getElementById('term-panel')?.remove();
    document.getElementById('files-panel')?.remove();
    document.getElementById('preview-panel')?.remove();
    document.getElementById('git-panel')?.remove();
    document.getElementById('plan-panel')?.remove();
  } else if (tab === 'terminal') {
    content.style.display = 'none';
    document.getElementById('files-panel')?.remove();
    document.getElementById('preview-panel')?.remove();
    document.getElementById('git-panel')?.remove();
    document.getElementById('plan-panel')?.remove();
    if (!document.getElementById('term-panel')) {
      const panel = document.createElement('div');
      panel.id = 'term-panel';
      panel.style.cssText = 'flex:1;display:flex;flex-direction:column;';
      panel.innerHTML = '<div class="ace-term"><div class="term-bar"><span class="term-title">Terminal — ' + (state.activeSession || '') + '</span></div><div class="term-body" id="term-output"></div><div class="term-input-row"><span class="term-prompt">$</span><input class="term-input" id="term-input" autofocus></div></div>';
      document.querySelector('.main').appendChild(panel);
      connectTerminal();
    }
  } else if (tab === 'files') {
    content.style.display = 'none';
    document.getElementById('term-panel')?.remove();
    document.getElementById('preview-panel')?.remove();
    document.getElementById('git-panel')?.remove();
    document.getElementById('plan-panel')?.remove();
    if (!document.getElementById('files-panel')) {
      const panel = document.createElement('div');
      panel.id = 'files-panel';
      panel.style.cssText = 'flex:1;overflow-y:auto;padding:16px;';
      panel.innerHTML = '<div id="file-tree"></div>';
      document.querySelector('.main').appendChild(panel);
      loadFiles('/');
    }
  } else if (tab === 'git') {
    content.style.display = 'none';
    document.getElementById('term-panel')?.remove();
    document.getElementById('files-panel')?.remove();
    document.getElementById('preview-panel')?.remove();
    document.getElementById('plan-panel')?.remove();
    if (!document.getElementById('git-panel')) {
      const panel = document.createElement('div');
      panel.id = 'git-panel';
      panel.style.cssText = 'flex:1;overflow-y:auto;padding:16px;';
      panel.innerHTML = '<div id="git-content">Loading...</div>';
      document.querySelector('.main').appendChild(panel);
      loadGitStatus();
    }
  } else if (tab === 'plan') {
    content.style.display = 'none';
    document.getElementById('term-panel')?.remove();
    document.getElementById('files-panel')?.remove();
    document.getElementById('git-panel')?.remove();
    document.getElementById('preview-panel')?.remove();
    if (!document.getElementById('plan-panel')) {
      const panel = document.createElement('div');
      panel.id = 'plan-panel';
      panel.style.cssText = 'flex:1;display:flex;flex-direction:column;';
      panel.innerHTML = '<div id="plan-content">Loading...</div>';
      document.querySelector('.main').appendChild(panel);
      loadPlan();
    }
  } else if (tab === 'preview') {
    content.style.display = 'none';
    document.getElementById('term-panel')?.remove();
    document.getElementById('files-panel')?.remove();
    document.getElementById('git-panel')?.remove();
    document.getElementById('plan-panel')?.remove();
    if (!document.getElementById('preview-panel')) {
      const panel = document.createElement('div');
      panel.id = 'preview-panel';
      panel.style.cssText = 'flex:1;display:flex;flex-direction:column;';
      panel.innerHTML = `<div class="preview-bar"><span style="color:var(--text-dim);font-size:12px">Live Preview</span><input class="preview-url" id="preview-url" value="/index.html" onchange="loadPreview()"></div><iframe class="preview-frame" id="preview-frame"></iframe>`;
      document.querySelector('.main').appendChild(panel);
      loadPreview();
    }
  }
}

// ─── Terminal WebSocket ──────────────────────────────────
function connectTerminal() {
  if (state.termWs) { state.termWs.close(); state.termWs = null; }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/term/${state.activeSession}`);
  state.termWs = ws;
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'output') {
        const out = document.getElementById('term-output');
        if (out) {
          const line = document.createElement('div');
          line.className = 'term-line';
          line.textContent = msg.data;
          out.appendChild(line);
          out.scrollTop = out.scrollHeight;
        }
      }
    } catch {}
  };
  const input = document.getElementById('term-input');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data: input.value + '\n' }));
        input.value = '';
      }
    });
    input.focus();
  }
}

// ─── File Browser ────────────────────────────────────────
async function loadFiles(dirPath) {
  const tree = document.getElementById('file-tree');
  if (!tree || !state.activeSession) return;
  try {
    const data = await api(`/api/sessions/${state.activeSession}/files${dirPath}`);
    let html = `<div style="margin-bottom:12px;color:var(--text-dim);font-size:13px;cursor:pointer" onclick="loadFiles('/')">📁 /</div>`;
    if (dirPath !== '/') {
      const parent = dirPath.split('/').slice(0, -1).join('/') || '/';
      html += `<div style="margin-bottom:8px;cursor:pointer;font-size:13px" onclick="loadFiles('${parent}')">↩ ..</div>`;
    }
    for (const entry of data.entries || []) {
      const icon = entry.type === 'dir' ? '📁' : '📄';
      const size = entry.type === 'file' ? `(${(entry.size/1024).toFixed(1)}KB)` : '';
      const click = entry.type === 'dir' 
        ? `onclick="loadFiles('${dirPath === '/' ? '' : dirPath}/${entry.name}')"`
        : `onclick="viewFile('${dirPath === '/' ? '' : dirPath}/${entry.name}')"`;
      html += `<div style="padding:4px 0;font-size:13px;cursor:pointer;${click ? '' : ''}" ${click}>${icon} ${entry.name} <span style="color:var(--text-dim)">${size}</span></div>`;
    }
    tree.innerHTML = html;
  } catch (err) {
    tree.innerHTML = `<p style="color:var(--text-dim)">No files yet. Run the agent to create some!</p>`;
  }
}

async function viewFile(filePath) {
  const content = await fetch(`/api/sessions/${state.activeSession}/files${filePath}`);
  const text = await content.text();
  const tree = document.getElementById('file-tree');
  tree.innerHTML = `<div style="cursor:pointer;color:var(--text-dim);font-size:13px;margin-bottom:8px" onclick="loadFiles('/')">← Back to files</div><pre style="font-family:var(--mono);font-size:12px;overflow-x:auto;padding:8px;background:var(--surface2);border-radius:6px">${escHtml(text)}</pre>`;
}

// ─── Live Preview ────────────────────────────────────────
function loadPreview() {
  const frame = document.getElementById('preview-frame');
  const urlInput = document.getElementById('preview-url');
  if (!frame || !state.activeSession) return;
  const filePath = urlInput?.value || '/index.html';
  frame.src = `/api/sessions/${state.activeSession}/preview${filePath}`;
}

// ─── Git Panel ───────────────────────────────────────────
async function loadGitStatus() {
  const el = document.getElementById('git-content');
  if (!el || !state.activeSession) return;
  try {
    const [status, diff] = await Promise.all([
      api(`/api/sessions/${state.activeSession}/git/status`),
      api(`/api/sessions/${state.activeSession}/git/diff`),
    ]);
    el.innerHTML = `
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <div class="dash-card" style="flex:1;padding:12px">
          <div style="color:var(--text-dim);font-size:12px">Branch</div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--green)">${escHtml(status.branch)}</div>
        </div>
        <div class="dash-card" style="flex:1;padding:12px">
          <div style="color:var(--text-dim);font-size:12px">Status</div>
          <div style="font-size:14px;color:${status.dirty?'var(--yellow)':'var(--green)'}">${status.dirty ? 'Dirty (uncommitted changes)' : 'Clean'}</div>
        </div>
      </div>
      <div style="margin-bottom:16px">
        <h3 style="font-size:14px;margin-bottom:8px">Recent Commits</h3>
        <div style="background:var(--surface2);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:12px;white-space:pre-wrap">${escHtml(status.log)}</div>
      </div>
      ${status.dirty ? `<div style="margin-bottom:16px">
        <h3 style="font-size:14px;margin-bottom:8px">Uncommitted Changes</h3>
        <div style="background:var(--surface2);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:12px;white-space:pre-wrap">${escHtml(status.status)}</div>
      </div>` : ''}
      ${diff.diff ? `<div style="margin-bottom:16px">
        <h3 style="font-size:14px;margin-bottom:8px">Diff</h3>
        <pre style="background:var(--surface2);border-radius:6px;padding:8px 12px;font-family:var(--mono);font-size:11px;overflow-x:auto;max-height:300px;overflow-y:auto">${escHtml(diff.diff)}</pre>
      </div>` : ''}
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="gitRefresh()">🔄 Refresh</button>
        <button class="btn" onclick="gitCommit()">💾 Commit All</button>
        <button class="btn btn-primary" onclick="gitCreatePR()">🔀 Create PR</button>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<p style="color:var(--text-dim)">Git not available in this session.</p>`;
  }
}

function gitRefresh() { loadGitStatus(); }

async function gitCommit() {
  const msg = prompt('Commit message:');
  if (!msg || !state.activeSession) return;
  await api(`/api/sessions/${state.activeSession}/git/commit`, {
    method: 'POST', body: JSON.stringify({ message: msg }),
  });
  loadGitStatus();
}

async function gitCreatePR() {
  const title = prompt('PR title:');
  if (!title || !state.activeSession) return;
  const repo = prompt('Remote repo URL (leave empty for local only):') || '';
  const result = await api(`/api/sessions/${state.activeSession}/pr`, {
    method: 'POST', body: JSON.stringify({ title, repo }),
  });
  if (result.prUrl) alert('PR created: ' + result.prUrl);
  else alert(result.message || 'Committed successfully');
  loadGitStatus();
}

// ─── Plan Editor ─────────────────────────────────────────
let planAutoSave = null;
async function loadPlan() {
  const el = document.getElementById('plan-content');
  if (!el || !state.activeSession) return;
  try {
    const data = await api(`/api/sessions/${state.activeSession}/plan`);
    const plan = data.plan;
    el.innerHTML = `
      <div style="padding:16px;flex:1;display:flex;flex-direction:column">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h2 style="font-size:18px">📋 Plan</h2>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="generatePlan()">🤖 Generate with Agent</button>
            <button class="btn" onclick="deletePlan()">🗑 Delete</button>
          </div>
        </div>
        <div style="margin-bottom:12px;color:var(--text-dim);font-size:13px">
          Edit the plan below. Teammates can see and edit it too. 
          Then go back to chat and type <code style="background:var(--surface3);padding:2px 6px;border-radius:3px">@ace do this</code> to execute it.
        </div>
        <textarea id="plan-editor" 
          style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:var(--mono);font-size:13px;line-height:1.6;resize:none;outline:none"
          placeholder="# Implementation Plan\n\n1. First step...\n2. Second step...\n3. Third step...\n\n## Notes\n- Any additional context..."
          oninput="autoSavePlan()"
        >${plan ? escHtml(plan.content) : ''}</textarea>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" onclick="savePlan()">💾 Save Plan</button>
          <button class="btn" onclick="executePlan()">🚀 Execute Plan (@ace do this)</button>
          <span id="plan-status" style="color:var(--text-dim);font-size:12px"></span>
        </div>
      </div>
    `;
  } catch (err) {
    el.innerHTML = `<div style="padding:16px"><p style="color:var(--text-dim)">Error loading plan: ${err.message}</p></div>`;
  }
}

function autoSavePlan() {
  if (planAutoSave) clearTimeout(planAutoSave);
  const statusEl = document.getElementById('plan-status');
  if (statusEl) statusEl.textContent = 'Editing...';
  planAutoSave = setTimeout(() => savePlan(), 3000);
}

async function savePlan() {
  const editor = document.getElementById('plan-editor');
  if (!editor || !state.activeSession) return;
  const content = editor.value;
  await api(`/api/sessions/${state.activeSession}/plan`, {
    method: 'POST',
    body: JSON.stringify({ content, userId: state.userId, title: 'Plan' }),
  });
  const statusEl = document.getElementById('plan-status');
  if (statusEl) statusEl.textContent = 'Saved ✓';
}

async function generatePlan() {
  if (!state.activeSession) return;
  const prompt = promptForInput('What should the plan cover?') || 'Create a detailed plan';
  await api(`/api/sessions/${state.activeSession}/plan/generate`, {
    method: 'POST',
    body: JSON.stringify({ prompt, userId: state.userId }),
  });
  alert('Agent is generating a plan. Check the chat for output, then paste it here.');
}

async function deletePlan() {
  if (!state.activeSession || !confirm('Delete this plan?')) return;
  await api(`/api/sessions/${state.activeSession}/plan`, { method: 'DELETE' });
  loadPlan();
}

async function executePlan() {
  await savePlan();
  // Send @ace do this to chat
  if (state.ws?.readyState === 1 && state.activeSession) {
    state.ws.send(JSON.stringify({
      type: 'chat', sessionId: state.activeSession, userId: state.userId,
      userName: state.userName, content: '@ace do this',
    }));
  }
  switchTab('chat');
}

function promptForInput(msg) {
  // Use a simple prompt as fallback
  const el = document.createElement('div');
  return window.prompt(msg);
}

// Handle plan updates via WebSocket
const origWsOnMessage = state.ws?.onmessage;

// ─── Init ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await setupUser();
  connectWS();
  await loadSessions();
  showDashboard();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
