                      </div>

                `}

            </div>

        </div>
        ${activeTab === 'manual' && html`

          </div>

    </div>
  `;
}

// ============================================================
function DockerSettings({ dockerStatus, onToggle }) {
  const [showMenu, setShowMenu] = useState(false);
  const menuRef = useRef(null);

  useEffect(() => {
    if (!showMenu) return;
    const handleClick = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false);
    };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, [showMenu]);

  const statusClass = dockerStatus.enabled ? 'active' : dockerStatus.available ? 'available' : 'unavailable';
  const label = dockerStatus.enabled ? 'Docker ●' : dockerStatus.available ? 'Docker ○' : 'Docker ✗';

  return html`
    <div class="settings-dropdown" ref=${menuRef}>
      <div class="docker-indicator ${statusClass}" onClick=${() => dockerStatus.available && setShowMenu(!showMenu)}>
        <${Icons.Docker} />
        <span>${label}</span>
      </div>
      ${showMenu && html`
        <div class="settings-menu">
          <div class="settings-menu-item" onClick=${() => { onToggle(!dockerStatus.enabled); }}>
            <label><${Icons.Docker} /> Docker Mode</label>
            <div class="toggle-switch ${dockerStatus.enabled ? 'on' : ''}" />
          </div>
        </div>
      `}
    </div>
  `;
}

// ============================================================
// Components: Voice Chat
// ============================================================
function VoiceChat({ sessionId, userId, wsStatus: wsStat }) {
  const [inVoice, setInVoice] = useState(false);
  const [muted, setMuted] = useState(false);
  const [showPanel, setShowPanel] = useState(false);
  const [voiceUsers, setVoiceUsers] = useState([]);
  const [speakingUsers, setSpeakingUsers] = useState(new Set());
  const [localStream, setLocalStream] = useState(null);
  const peerConnections = useRef(new Map()); // userId -> RTCPeerConnection
  const remoteStreams = useRef(new Map()); // userId -> MediaStream
  const audioElements = useRef(new Map()); // userId -> HTMLAudioElement
  const analyserRefs = useRef(new Map()); // userId -> AnalyserNode
  const animFrameRef = useRef(null);

  // ICE servers configuration
  const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  // Audio level detection
  const detectSpeaking = useCallback(() => {
    const speaking = new Set();
    for (const [uid, analyser] of analyserRefs.current) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a, b) => a + b, 0) / data.length;
      if (avg > 20) speaking.add(uid);
    }
    setSpeakingUsers(prev => {
      const changed = speaking.size !== prev.size || [...speaking].some(s => !prev.has(s));
      return changed ? speaking : prev;
    });
    animFrameRef.current = requestAnimationFrame(detectSpeaking);
  }, []);

  // Clean up peer connections
  const cleanupPeers = useCallback(() => {
    for (const [uid, pc] of peerConnections.current) {
      pc.close();
    }
    peerConnections.current.clear();
    remoteStreams.current.clear();
    for (const [, audio] of audioElements.current) {
      audio.pause();
      audio.srcObject = null;
    }
    audioElements.current.clear();
    analyserRefs.current.clear();
    if (animFrameRef.current) {
      cancelAnimationFrame(animFrameRef.current);
      animFrameRef.current = null;
    }
  }, []);

  // Create a peer connection for a remote user
  const createPeerConnection = useCallback((remoteUserId, isInitiator) => {
    if (peerConnections.current.has(remoteUserId)) {
      const existing = peerConnections.current.get(remoteUserId);
      existing.close();
    }

    const pc = new RTCPeerConnection(iceConfig);
    peerConnections.current.set(remoteUserId, pc);

    // Add local tracks
    if (localStream) {
      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });
    }

    // Handle remote stream
    pc.ontrack = (event) => {
      const stream = event.streams[0];
      remoteStreams.current.set(remoteUserId, stream);

      // Create or update audio element
      let audio = audioElements.current.get(remoteUserId);
      if (!audio) {
        audio = new Audio();
        audio.autoplay = true;
        audioElements.current.set(remoteUserId, audio);
      }
      audio.srcObject = stream;

      // Set up analyser for speaking detection
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        analyserRefs.current.set(remoteUserId, analyser);
      } catch {}
    };

    // ICE candidate handling
    pc.onicecandidate = (event) => {
      if (event.candidate) {
        ws.send(WS_EVENTS.VoiceSignal, {
          sessionId,
          targetUserId: remoteUserId,
          signal: { type: 'ice-candidate', candidate: event.candidate },
        }, sessionId);
      }
    };

    if (isInitiator) {
      pc.createOffer().then(offer => {
        pc.setLocalDescription(offer);
        ws.send(WS_EVENTS.VoiceSignal, {
          sessionId,
          targetUserId: remoteUserId,
          signal: { type: 'offer', sdp: offer },
        }, sessionId);
      }).catch(() => {});
    }

    return pc;
  }, [localStream, sessionId]);

  // Handle incoming signals
  useWS(WS_EVENTS.VoiceSignal, useCallback((msg) => {
    if (!inVoice || !msg.payload) return;
    const { signal, fromUserId } = msg.payload;
    if (fromUserId === userId) return;

    if (signal.type === 'offer') {
      const pc = createPeerConnection(fromUserId, false);
      pc.setRemoteDescription(new RTCSessionDescription(signal.sdp)).then(() => {
        return pc.createAnswer();
      }).then(answer => {
        pc.setLocalDescription(answer);
        ws.send(WS_EVENTS.VoiceSignal, {
          sessionId,
          targetUserId: fromUserId,
          signal: { type: 'answer', sdp: answer },
        }, sessionId);
      }).catch(() => {});
    } else if (signal.type === 'answer') {
      const pc = peerConnections.current.get(fromUserId);
      if (pc) {
        pc.setRemoteDescription(new RTCSessionDescription(signal.sdp)).catch(() => {});
      }
    } else if (signal.type === 'ice-candidate') {
      const pc = peerConnections.current.get(fromUserId);
      if (pc && signal.candidate) {
        pc.addIceCandidate(new RTCIceCandidate(signal.candidate)).catch(() => {});
      }
    }
  }, [inVoice, userId, sessionId, createPeerConnection]));

  // Handle other users joining/leaving voice
  useWS(WS_EVENTS.VoiceJoin, useCallback((msg) => {
    if (!inVoice || !msg.payload) return;
    const { userId: joinedUserId } = msg.payload;
    if (joinedUserId === userId) return;
    setVoiceUsers(prev => {
      if (prev.includes(joinedUserId)) return prev;
      return [...prev, joinedUserId];
    });
    // Initiate peer connection as the existing user
    createPeerConnection(joinedUserId, true);
  }, [inVoice, userId, createPeerConnection]));

  useWS(WS_EVENTS.VoiceLeave, useCallback((msg) => {
    if (!msg.payload) return;
    const { userId: leftUserId } = msg.payload;
    setVoiceUsers(prev => prev.filter(u => u !== leftUserId));
    // Clean up peer connection
    const pc = peerConnections.current.get(leftUserId);
    if (pc) {
      pc.close();
      peerConnections.current.delete(leftUserId);
    }
    const audio = audioElements.current.get(leftUserId);
    if (audio) {
      audio.pause();
      audio.srcObject = null;
      audioElements.current.delete(leftUserId);
    }
    analyserRefs.current.delete(leftUserId);
  }, []));

  // Join voice
  const joinVoice = useCallback(async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      setLocalStream(stream);
      setInVoice(true);
      setShowPanel(true);
      setVoiceUsers([userId]);
      ws.send(WS_EVENTS.VoiceJoin, { sessionId }, sessionId);
      // Start audio level detection
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        analyserRefs.current.set(userId, analyser);
      } catch {}
      animFrameRef.current = requestAnimationFrame(detectSpeaking);
    } catch {
      // Microphone permission denied
      if (window._showToast) window._showToast({ type: 'error', message: 'Microphone access denied. Please allow microphone permissions.' });
    }
  }, [sessionId, userId, detectSpeaking]);

  // Leave voice
  const leaveVoice = useCallback(() => {
    // Notify others
    ws.send(WS_EVENTS.VoiceLeave, { sessionId }, sessionId);
    // Stop local stream
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
    }
    setLocalStream(null);
    setInVoice(false);
    setShowPanel(false);
    setMuted(false);
    setVoiceUsers([]);
    setSpeakingUsers(new Set());
    cleanupPeers();
  }, [localStream, sessionId, cleanupPeers]);

  // Toggle mute
  const toggleMute = useCallback(() => {
    if (localStream) {
      localStream.getAudioTracks().forEach(t => { t.enabled = muted; });
      setMuted(!muted);
    }
  }, [localStream, muted]);

  // Clean up on unmount
  useEffect(() => {
    return () => {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
      }
      cleanupPeers();
    };
  }, []);

  return html`
    <${Fragment}>
      <button
        class="voice-btn ${inVoice ? 'active' : ''}"
        onClick=${inVoice ? () => setShowPanel(!showPanel) : joinVoice}
        disabled=${wsStat !== 'connected'}
        title=${inVoice ? 'Voice chat connected' : 'Join voice chat'}
        style=${{ opacity: wsStat === 'connected' ? 1 : 0.4 }}
      >
        ${inVoice ? html`<${Icons.Phone} />` : html`<${Icons.Mic} />`}
        <span>${inVoice ? 'Voice ●' : 'Voice'}</span>
      </button>
      ${showPanel && inVoice && html`
        <div class="voice-panel">
          <div class="voice-panel-header">
            <span>🎤 Voice Chat</span>
            <button style=${{ color: 'var(--muted)', fontSize: '1rem', padding: '2px' }} onClick=${() => setShowPanel(false)}>
              <${Icons.Close} />
            </button>
          </div>
          <div class="voice-panel-body">
            ${voiceUsers.map(uid => html`
              <div key=${uid} class="voice-user">
                <div class="voice-user-avatar">${getInitials(uid)}</div>
                <span class="voice-user-name">${uid === userId ? 'You' : uid.slice(0, 12)}</span>
                ${speakingUsers.has(uid) && html`<span class="voice-speaking-indicator" />`}
                ${uid === userId && muted && html`<span class="voice-muted-indicator">🔇</span>`}
              </div>
            `)}
            ${voiceUsers.length === 0 && html`
              <div style=${{ padding: '20px 16px', textAlign: 'center', color: 'var(--muted)', fontSize: '0.82rem' }}>
                Connecting...
              </div>
            `}
          </div>
          <div class="voice-panel-footer">
            <button class="voice-mute-btn ${muted ? 'muted' : ''}" onClick=${toggleMute}>
              ${muted ? html`<${Icons.MicOff} />` : html`<${Icons.Mic} />`}
              ${muted ? 'Unmute' : 'Mute'}
            </button>
            <button class="voice-leave-btn" onClick=${leaveVoice}>
              <${Icons.PhoneOff} /> Leave
            </button>
          </div>
        </div>
      `}
    <//>
  `;
}

// ============================================================
// Main App Component
// ============================================================
function App() {
  const [wsStatus, setWsStatus] = useState('disconnected');
  const [sessions, setSessions] = useState([]);
  const [currentSessionId, setCurrentSessionId] = useState(null);
  const [messages, setMessages] = useState({});
  const [users, setUsers] = useState([]);
  const [userId, setUserId] = useState(null);
  const [centerTab, setCenterTab] = useState('chat');
  const [terminalOutput, setTerminalOutput] = useState('');
  const [planSteps, setPlanSteps] = useState([]);
  const [fileTree, setFileTree] = useState([]);
  const [previewUrl, setPreviewUrl] = useState('');
  const [diffs, setDiffs] = useState([]);
  const [rightCollapsed, setRightCollapsed] = useState(false);
  const [showNewSessionModal, setShowNewSessionModal] = useState(false);
  const [showForkModal, setShowForkModal] = useState(false);
  const [forkSourceSessionId, setForkSourceSessionId] = useState(null);
  const [activities, setActivities] = useState([]);
  const [loadingMessages, setLoadingMessages] = useState(false);
  const [agentRunning, setAgentRunning] = useState(false);
  const [agents, setAgents] = useState([]);
  const [toast, setToast] = useState(null);
  const [githubAuth, setGithubAuth] = useState({ authenticated: false, user: null, githubConnected: false });
  const [dockerStatus, setDockerStatus] = useState({ available: false, enabled: false, containers: 0 });

  // Expose toast for voice chat
  useEffect(() => { window._showToast = setToast; }, []);

  // Check GitHub auth status on mount
  useEffect(() => {
    fetch('/api/auth/status')
      .then(r => r.json())
      .then(data => setGithubAuth(data))
      .catch(() => {});
  }, []);

  // Fetch Docker status on mount
  useEffect(() => {
    fetch('/api/docker/status')
      .then(r => r.json())
      .then(data => setDockerStatus(data))
      .catch(() => {});
  }, []);

  // Connect WebSocket on mount
  useEffect(() => {
    ws.onStatusChange = (status) => setWsStatus(status);
    ws.connect();
    return () => { ws.onStatusChange = null; };
  }, []);

  // Auto-dismiss toast after 4 seconds
  useEffect(() => {
    if (!toast) return;
    const timer = setTimeout(() => setToast(null), 4000);
    return () => clearTimeout(timer);
  }, [toast]);

  // On connect: request session list
  useEffect(() => {
    if (wsStatus === 'connected') {
      ws.send(WS_EVENTS.SessionList, {});
    }
  }, [wsStatus]);

  // Load messages when session changes
  useEffect(() => {
    if (currentSessionId) {
      setLoadingMessages(true);
      setTerminalOutput('');
      setPlanSteps([]);
      setFileTree([]);
      setDiffs([]);
      setPreviewUrl('');
      fetch(`/api/sessions/${currentSessionId}/messages?limit=100`)
        .then(r => r.json())
        .then(msgs => {
          setMessages(prev => ({ ...prev, [currentSessionId]: msgs }));
          setLoadingMessages(false);
        })
        .catch(() => setLoadingMessages(false));

      // Join the session
      ws.send(WS_EVENTS.SessionJoin, { sessionId: currentSessionId }, currentSessionId);
      ws.send(WS_EVENTS.FileList, { sessionId: currentSessionId }, currentSessionId);
    }
  }, [currentSessionId]);

  // WS event handlers
  useWS(WS_EVENTS.SessionList, useCallback((msg) => {
    if (Array.isArray(msg.payload)) setSessions(msg.payload);
  }, []));

  useWS(WS_EVENTS.SessionCreate, useCallback((msg) => {
    if (msg.payload) {
      setSessions(prev => {
        const exists = prev.find(s => s.id === msg.payload.id);
        if (exists) return prev;
        return [...prev, msg.payload];
      });
    }
  }, []));

  useWS(WS_EVENTS.UserJoin, useCallback((msg) => {
    if (msg.payload?.userId) {
      setUserId(msg.payload.userId);
      // Add the user to the users list if not already present
      setUsers(prev => {
        if (prev.find(u => u.id === msg.payload.userId)) return prev;
        return [...prev, {
          id: msg.payload.userId,
          name: msg.payload.name || msg.payload.userId,
          isAgent: msg.payload.isAgent || false,
        }];
      });
    }
  }, []));

  useWS(WS_EVENTS.UserLeave, useCallback((msg) => {
    if (msg.payload?.userId) {
      setUsers(prev => prev.filter(u => u.id !== msg.payload.userId));
    }
  }, []));

  useWS(WS_EVENTS.ChatMessage, useCallback((msg) => {
    if (msg.payload?.sessionId) {
      setMessages(prev => ({
        ...prev,
        [msg.payload.sessionId]: [...(prev[msg.payload.sessionId] || []), msg.payload],
      }));
    }
  }, []));

  useWS(WS_EVENTS.TerminalOutput, useCallback((msg) => {
    if (msg.payload?.data) {
      setTerminalOutput(prev => prev + msg.payload.data);
    }
  }, []));

  useWS(WS_EVENTS.PlanCreate, useCallback((msg) => {
    if (msg.payload?.steps) setPlanSteps(msg.payload.steps);
  }, []));

  useWS(WS_EVENTS.PlanUpdate, useCallback((msg) => {
    if (msg.payload?.stepId) {
      setPlanSteps(prev => prev.map(s =>
        s.id === msg.payload.stepId ? { ...s, ...(msg.payload.update || {}) } : s
      ));
    }
  }, []));

  useWS(WS_EVENTS.FileList, useCallback((msg) => {
    if (msg.payload?.files) setFileTree(msg.payload.files);
  }, []));

  useWS(WS_EVENTS.FileChange, useCallback((msg) => {
    // Refresh file tree when files change
    if (currentSessionId) {
      ws.send(WS_EVENTS.FileList, { sessionId: currentSessionId }, currentSessionId);
    }
  }, [currentSessionId]));

  useWS(WS_EVENTS.DiffShow, useCallback((msg) => {
    if (msg.payload) {
      setDiffs(prev => [msg.payload, ...prev].slice(0, 20));
    }
  }, []));

  useWS(WS_EVENTS.PreviewUrl, useCallback((msg) => {
    if (msg.payload?.url) setPreviewUrl(msg.payload.url);
  }, []));

  useWS(WS_EVENTS.Activity, useCallback((msg) => {
    if (msg.payload) {
      setActivities(prev => [{
        type: msg.payload.action,
        text: msg.payload.message || msg.payload.action || 'Activity',
        time: Date.now(),
      }, ...prev].slice(0, 50));
    }
  }, []));

  useWS(WS_EVENTS.AgentOutput, useCallback((msg) => {
    // Buffer agent output and flush as a single chat message after 500ms of silence
    if (msg.payload?.data && msg.sessionId) {
      const data = msg.payload.data;
      const agentId = msg.payload.agentId || 'default';
      if (!window._agentBuffer) window._agentBuffer = {};
      const bufferKey = msg.sessionId + ':' + agentId;
      if (!window._agentBuffer[bufferKey]) window._agentBuffer[bufferKey] = '';
      window._agentBuffer[bufferKey] += data;

      if (window._agentFlushTimers) clearTimeout(window._agentFlushTimers[bufferKey]);
      else window._agentFlushTimers = {};
      window._agentFlushTimers[bufferKey] = setTimeout(() => {
        const sid = msg.sessionId;
        const accumulated = window._agentBuffer?.[bufferKey] || '';
        if (accumulated) {
          const agentMsg = {
            id: 'agent-' + Date.now(),
            sessionId: sid,
            userId: 'agent',
            agentId: agentId,
            content: accumulated,
            type: 'text',
            timestamp: Date.now(),
          };
          setMessages(prev => ({
            ...prev,
            [sid]: [...(prev[sid] || []), agentMsg],
          }));
          if (window._agentBuffer) window._agentBuffer[bufferKey] = '';
        }
      }, 500);
    }
  }, []));

  useWS(WS_EVENTS.AgentStop, useCallback((msg) => {
    // Agent stopped — reset running state and flush buffer
    setAgentRunning(false);
    const agentId = msg.payload?.agentId || 'default';
    if (msg.sessionId) {
      const bufferKey = msg.sessionId + ':' + agentId;
      const accumulated = window._agentBuffer?.[bufferKey];
      if (accumulated) {
        const agentMsg = {
          id: 'agent-' + Date.now(),
          sessionId: msg.sessionId,
          userId: 'agent',
          agentId: agentId,
          content: accumulated,
          type: 'text',
          timestamp: Date.now(),
        };
        setMessages(prev => ({
          ...prev,
          [msg.sessionId]: [...(prev[msg.sessionId] || []), agentMsg],
        }));
        window._agentBuffer[bufferKey] = '';
      }
    }
  }, []));

  useWS(WS_EVENTS.AgentStatus, useCallback((msg) => {
    if (msg.payload) {
      setAgentRunning(!!msg.payload.running);
    }
  }, []));

  useWS(WS_EVENTS.AgentList, useCallback((msg) => {
    if (msg.payload?.agents) {
      setAgents(msg.payload.agents);
      setAgentRunning(msg.payload.agents.some(a => a.running));
    }
  }, []));

  // Handlers
  const handleSelectSession = useCallback((id) => {
    setCurrentSessionId(id);
    setAgentRunning(false);
    // Query agent status for the new session
    ws.send(WS_EVENTS.AgentStatus, { sessionId: id }, id);
  }, []);

  const handleCreateSession = useCallback((name, repoUrl, existingSession) => {
    if (existingSession) {
      // Session already created (from issue/PR) — just add it locally
      setSessions(prev => {
        const exists = prev.find(s => s.id === existingSession.id);
        if (exists) return prev;
        return [...prev, existingSession];
      });
      setCurrentSessionId(existingSession.id);
      setShowNewSessionModal(false);
      return;
    }
    fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, repoUrl }),
    })
      .then(r => r.json())
      .then(session => {
        if (session?.id) {
          setSessions(prev => [...prev, session]);
          setCurrentSessionId(session.id);
          setShowNewSessionModal(false);
          if (session.cloneError) {
            setToast({ type: 'error', message: 'Clone failed: ' + session.cloneError });
          }
        }
      })
      .catch(() => {
        setToast({ type: 'error', message: 'Failed to create session' });
      });
  }, []);

  const handleDeleteSession = useCallback((id) => {
    fetch(`/api/sessions/${id}`, { method: 'DELETE' })
      .then(r => r.json())
      .then(() => {
        setSessions(prev => prev.filter(s => s.id !== id));
        if (currentSessionId === id) setCurrentSessionId(null);
      })
      .catch(() => {});
  }, [currentSessionId]);

  const handleForkSession = useCallback((id) => {
    setForkSourceSessionId(id);
    setShowForkModal(true);
  }, []);

  const handleForkSubmit = useCallback(({ name, prompt }) => {
    if (!forkSourceSessionId) return;
    fetch(`/api/sessions/${forkSourceSessionId}/fork`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, prompt }),
    })
      .then(r => r.json())
      .then(session => {
        if (session?.id) {
          setSessions(prev => [...prev, session]);
          setCurrentSessionId(session.id);
          setShowForkModal(false);
          setForkSourceSessionId(null);
          setToast({ type: 'success', message: 'Session forked successfully' });
        }
      })
      .catch(() => {
        setToast({ type: 'error', message: 'Failed to fork session' });
        setShowForkModal(false);
      });
  }, [forkSourceSessionId]);

  const handleSendMessage = useCallback((content, type) => {
    if (!currentSessionId || !content) return;
    ws.send(WS_EVENTS.ChatMessage, { sessionId: currentSessionId, content, type }, currentSessionId);
  }, [currentSessionId]);

  const handleGithubClick = useCallback(() => {
    if (!githubAuth?.githubConnected) {
      window.location.href = '/api/auth/github';
    }
  }, [githubAuth]);

  const handleDockerToggle = useCallback((enabled) => {
    fetch('/api/docker/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled }),
    })
      .then(r => r.json())
      .then(data => {
        setDockerStatus(prev => ({ ...prev, enabled: data.enabled }));
        setToast({ type: 'success', message: data.enabled ? 'Docker mode enabled' : 'Docker mode disabled' });
      })
      .catch(() => {
        setToast({ type: 'error', message: 'Failed to toggle Docker mode' });
      });
  }, []);

  const currentMessages = messages[currentSessionId] || [];

  // No session selected → Dashboard
  if (!currentSessionId) {
    return html`
      <div class="app">
        <${Header} wsStatus=${wsStatus} userId=${userId} sessions=${sessions} currentSessionId=${null} githubAuth=${githubAuth} onGithubClick=${handleGithubClick} dockerStatus=${dockerStatus} onDockerToggle=${handleDockerToggle} voiceChatProps=${null} />
        <${Dashboard}
          sessions=${sessions}
          onSelectSession=${handleSelectSession}
          onCreateSession=${() => setShowNewSessionModal(true)}
          activities=${activities}
        />
        ${showNewSessionModal && html`<${NewSessionModal} onClose=${() => setShowNewSessionModal(false)} onSubmit=${handleCreateSession} githubAuth=${githubAuth} />`}
        ${showForkModal && html`<${ForkSessionModal} onClose=${() => { setShowForkModal(false); setForkSourceSessionId(null); }} onSubmit=${handleForkSubmit} sourceSession=${sessions.find(s => s.id === forkSourceSessionId)} />`}
        <${Toast} toast=${toast} onClose=${() => setToast(null)} />
      </div>
    `;
  }

  // Session view
  return html`
    <div class="app">
      <${Header} wsStatus=${wsStatus} userId=${userId} sessions=${sessions} currentSessionId=${currentSessionId} githubAuth=${githubAuth} onGithubClick=${handleGithubClick} dockerStatus=${dockerStatus} onDockerToggle=${handleDockerToggle} voiceChatProps=${{ sessionId: currentSessionId, userId, wsStatus }} />
      <div class="main">
        <${Sidebar}
          sessions=${sessions}
          currentSessionId=${currentSessionId}
          onSelectSession=${handleSelectSession}
          onCreateSession=${() => setShowNewSessionModal(true)}
          onDeleteSession=${handleDeleteSession}
          onForkSession=${handleForkSession}
        />
        <div class="center-panel">
          <div class="tab-bar">
            <div class="tab ${centerTab === 'chat' ? 'active' : ''}" onClick=${() => setCenterTab('chat')}>💬 Chat</div>
            <div class="tab ${centerTab === 'terminal' ? 'active' : ''}" onClick=${() => setCenterTab('terminal')}>
              <${Icons.Terminal} /> Terminal
            </div>
            <div class="tab ${centerTab === 'plan' ? 'active' : ''}" onClick=${() => setCenterTab('plan')}>📋 Plan</div>
          </div>
          <div class="content-area" style=${{ display: 'flex', flexDirection: 'column' }}>
            ${loadingMessages && html`<div class="loading-spinner"><div class="spinner" /></div>`}
            ${!loadingMessages && centerTab === 'chat' && html`
              <${ChatTab} messages=${currentMessages} users=${users} sessionId=${currentSessionId} onSend=${handleSendMessage} agentRunning=${agentRunning} onAgentRunningChange=${setAgentRunning} agents=${agents} />
            `}
            ${centerTab === 'terminal' && html`
              <${TerminalTab} sessionId=${currentSessionId} terminalOutput=${terminalOutput} />
            `}
            ${centerTab === 'plan' && html`
              <${PlanTab} sessionId=${currentSessionId} planSteps=${planSteps} />
            `}
          </div>
        </div>
        <${RightPanel}
          sessionId=${currentSessionId}
          fileTree=${fileTree}
          previewUrl=${previewUrl}
          diffs=${diffs}
          collapsed=${rightCollapsed}
          onToggle=${() => setRightCollapsed(!rightCollapsed)}
        />
      </div>
      ${showNewSessionModal && html`<${NewSessionModal} onClose=${() => setShowNewSessionModal(false)} onSubmit=${handleCreateSession} githubAuth=${githubAuth} />`}
      ${showForkModal && html`<${ForkSessionModal} onClose=${() => { setShowForkModal(false); setForkSourceSessionId(null); }} onSubmit=${handleForkSubmit} sourceSession=${sessions.find(s => s.id === forkSourceSessionId)} />`}
      <${Toast} toast=${toast} onClose=${() => setToast(null)} />
    </div>
  `;
}

// ============================================================
// Mount
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(html`<${App} />`);

</script>
</body>
</html>
