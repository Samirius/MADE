<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADE</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo"><span>⚡</span><div>MADE<small>Multiplayer Agentic Development Environment</small></div></div>
    <div class="sidebar-section">
      <h3>Dashboard</h3>
      <div class="session-item active" onclick="showDashboard()" id="nav-dashboard">🏠 Home</div>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h3>Sessions</h3>
        <select id="session-sort" onchange="renderSessionList()" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-size:11px;cursor:pointer">
          <option value="recent">Recent</option>
          <option value="name">Name</option>
          <option value="active">Active</option>
        </select>
      </div>
      <input type="text" id="session-search" placeholder="Search sessions..." oninput="renderSessionList()"
        style="width:100%;box-sizing:border-box;padding:6px 8px;margin:4px 0 8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none">
      <div id="session-list"></div>
      <div class="new-session-btn" onclick="showNewSessionModal()">+ New Session</div>
    </div>
    <div class="sidebar-section" style="border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:8px;padding:4px 8px">
        <div class="avatar" style="width:24px;height:24px;font-size:10px;background:var(--accent)">S</div>
        <span style="font-size:12px" id="user-name">Setting up...</span>
      </div>
    </div>
  </div>
  <div class="main" id="main-content">
    <!-- Dynamic content -->
  </div>
</div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let state = { sessions: [], activeSession: null, userId: null, userName: '', ws: null, messages: {}, dashboard: true, activeTab: 'chat', termWs: null, inputMode: 'chat' };
const API = '';

async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: {'Content-Type':'application/json',...opts.headers}, ...opts });
  if (!r.ok) throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

function uid() { return Math.random().toString(36).slice(2, 10); }

// Feature 4: Track agent start time for duration display
let _agentStartTime = null;

// Feature 4: Append agent system message (start/done) to chat
function appendAgentSystemMessage(text, timestamp) {
  const chat = document.getElementById('chat-area');
  if (!chat) return;
  const time = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-avatar">⚡</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:var(--text-dim)">System</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="agent-system-msg">${escHtml(text)}</div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ─── WebSocket ───────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  state.ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'message') {
      if (!state.messages[msg.message.sessionId]) state.messages[msg.message.sessionId] = [];
      state.messages[msg.message.sessionId].push(msg.message);
      if (state.activeSession === msg.message.sessionId && !state.dashboard) appendMessage(msg.message);
      // Feature A: auto-refresh split preview on agent_done
      if (msg.message.type === 'agent_done' && state.activeSession === msg.message.sessionId) {
        if (splitOpen) setTimeout(() => refreshInlinePreview(), 1000);
        // Feature B: fetch and render diff card after agent finishes
        setTimeout(() => fetchAndRenderDiffCard(msg.message.sessionId), 2000);
        // Feature 2: hide progress bar
        hideAgentProgress();
      }
      // Feature 2: show/update agent progress bar
      if (msg.message.type === 'agent_start' && state.activeSession === msg.message.sessionId) {
        showAgentProgress();
        // Feature 4: Show agent model and system message
        _agentStartTime = Date.now();
        const model = msg.message.model || msg.message.adapter || 'agent';
        const modelDisplay = document.getElementById('agent-model-display');
        const modelName = document.getElementById('agent-model-name');
        if (modelDisplay && modelName) {
          modelName.textContent = model;
          modelDisplay.style.display = 'inline-flex';
        }
        // Add system message to chat
        appendAgentSystemMessage('🤖 Agent started (' + model + ')', msg.message.timestamp);
      }
      if (msg.message.type === 'agent_stream' && state.activeSession === msg.message.sessionId) {
        updateAgentProgress(msg.message.content);
      }
      // Feature 4: Agent done with duration
      if (msg.message.type === 'agent_done' && state.activeSession === msg.message.sessionId && _agentStartTime) {
        const duration = Math.round((Date.now() - _agentStartTime) / 1000);
        appendAgentSystemMessage('✅ Agent finished (' + duration + 's)', msg.message.timestamp);
        _agentStartTime = null;
        // Hide model display after a delay
        setTimeout(() => {
          const modelDisplay = document.getElementById('agent-model-display');
          if (modelDisplay) modelDisplay.style.display = 'none';
        }, 5000);
      }
    }
    if (msg.type === 'message_edited') {
      // Update in local cache
      if (state.messages[msg.message.sessionId]) {
        const idx = state.messages[msg.message.sessionId].findIndex(m => m.id === msg.message.id);
        if (idx !== -1) state.messages[msg.message.sessionId][idx] = msg.message;
      }
      // Update DOM
      if (state.activeSession === msg.message.sessionId) {
        const contentEl = document.getElementById('msg-content-' + msg.message.id);
        if (contentEl) contentEl.textContent = msg.message.content;
        const msgEl = document.getElementById('msg-' + msg.message.id);
        if (msgEl && !msgEl.querySelector('.edited-badge')) {
          const timeEl = msgEl.querySelector('.msg-time');
          if (timeEl) timeEl.insertAdjacentHTML('afterend', '<span class="edited-badge" style="color:var(--text-dim);font-size:10px;margin-left:4px">(edited)</span>');
        }
      }
    }
    if (msg.type === 'message_deleted') {
      // Remove from local cache
      if (state.activeSession) {
        const idx = (state.messages[state.activeSession] || []).findIndex(m => m.id === msg.messageId);
        if (idx !== -1) state.messages[state.activeSession].splice(idx, 1);
      }
      // Remove from DOM
      const el = document.getElementById('msg-' + msg.messageId);
      if (el) el.remove();
    }
    if (msg.type === 'plan_typing') {
      const el = document.getElementById('plan-typing-indicator');
      if (el) el.textContent = msg.userName + ' is editing...';
      if (el) el.style.display = 'block';
      clearTimeout(window._planTypingTimeout);
      window._planTypingTimeout = setTimeout(() => { if (el) el.style.display = 'none'; }, 3000);
    }
    if (msg.type === 'plan_updated') {
      // Refresh plan editor if open
      const editor = document.getElementById('plan-editor');
      if (editor && state.activeSession) loadPlan();
    }
    if (msg.type === 'session_created' || msg.type === 'session_updated' || msg.type === 'session_deleted') {
      loadSessions();
      if (msg.type === 'session_updated' && msg.session) updateSessionSummary(msg.session);
    }
  };
  state.ws.onclose = () => setTimeout(connectWS, 3000);
}

// ─── User Setup ──────────────────────────────────────────
async function setupUser() {
  const name = localStorage.getItem('made_user_name') || localStorage.getItem('ace_user_name') || prompt('Your name:') || 'User';
  localStorage.setItem('made_user_name', name);
  state.userName = name;
  const user = await api('/api/users', { method: 'POST', body: JSON.stringify({ name }) });
  state.userId = user.id;
  document.getElementById('user-name').textContent = name;
}

// ─── Sessions ────────────────────────────────────────────
async function loadSessions() {
  const data = await api('/api/sessions');
  state.sessions = data.sessions;
  renderSessionList();
}

function renderSessionList() {
  const el = document.getElementById('session-list');
  const searchEl = document.getElementById('session-search');
  const sortEl = document.getElementById('session-sort');
  const query = (searchEl?.value || '').toLowerCase().trim();
  const sortBy = sortEl?.value || 'recent';

  let filtered = state.sessions;
  if (query) {
    filtered = filtered.filter(s => s.name.toLowerCase().includes(query));
  }

  // Sort
  if (sortBy === 'name') {
    filtered.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortBy === 'active') {
    filtered.sort((a, b) => (b.agentRunning ? 1 : 0) - (a.agentRunning ? 1 : 0));
  } else {
    filtered.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  }

  const mySessions = filtered.filter(s => s.createdBy === state.userId);
  const otherSessions = filtered.filter(s => s.createdBy !== state.userId);
  
  let html = '';
  if (mySessions.length > 0) {
    html += '<div style="color:var(--text-dim);font-size:11px;padding:4px 8px;margin-top:4px">My Sessions</div>';
    html += mySessions.map(s => sessionItemHtml(s)).join('');
  }
  if (otherSessions.length > 0) {
    html += '<div style="color:var(--text-dim);font-size:11px;padding:4px 8px;margin-top:8px;border-top:1px solid var(--border)">Other Sessions</div>';
    html += otherSessions.map(s => sessionItemHtml(s)).join('');
  }
  if (mySessions.length === 0 && otherSessions.length === 0) {
    html = `<div style="color:var(--text-dim);font-size:12px;padding:8px">${query ? 'No sessions match "' + escHtml(query) + '"' : 'No sessions yet'}</div>`;
  }
  el.innerHTML = html;
}

function sessionItemHtml(s) {
  // Feature 4: Rich status badges
  let badgeClass, badgeText;
  if (s.agentRunning) {
    badgeClass = 'working';
    badgeText = 'Working...';
  } else if (s.agentError) {
    badgeClass = 'error';
    badgeText = 'Error';
  } else if (s.agentWaiting) {
    badgeClass = 'waiting';
    badgeText = 'Waiting';
  } else {
    badgeClass = 'idle';
    badgeText = 'Idle';
  }
  return `<div class="session-item ${state.activeSession === s.id ? 'active' : ''}" onclick="openSession('${s.id}')">
      <span class="badge ${badgeClass}">${badgeText}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(s.name)}</span>
      <span class="count">${s.messageCount || 0}</span>
    </div>`;
}

async function openSession(id) {
  state.activeSession = id;
  state.dashboard = false;
  renderSessionList();

  // Join WS
  if (state.ws?.readyState === 1) {
    state.ws.send(JSON.stringify({ type: 'join', sessionId: id, userId: state.userId, userName: state.userName }));
  }

  const data = await api(`/api/sessions/${id}`);
  state.messages[id] = data.messages || [];

  const main = document.getElementById('main-content');
  const s = data;
  main.innerHTML = `
    <div class="session-header">
      <h2>
        # ${s.name}
        <span class="branch">${s.branch}</span>
        ${s.agentRunning ? '<span style="color:var(--green);font-size:12px">● Agent running</span>' : ''}
        <span class="agent-model-display" id="agent-model-display" style="display:none">🤖 <span id="agent-model-name"></span></span>
      </h2>
      <div class="header-actions">
        <button class="btn ${getActiveTab()==='chat'?'active':''}" onclick="switchTab('chat')">💬 Chat</button>
        <button class="btn ${getActiveTab()==='terminal'?'active':''}" onclick="switchTab('terminal')">⌨ Terminal</button>
        <button class="btn ${getActiveTab()==='files'?'active':''}" onclick="switchTab('files')">📁 Files</button>
        <button class="btn ${getActiveTab()==='git'?'active':''}" onclick="switchTab('git')">🔀 Git</button>
        <button class="btn ${getActiveTab()==='plan'?'active':''}" onclick="switchTab('plan')">📋 Plan</button>
        <button class="btn" onclick="toggleSplit()" id="btn-split-preview">👁 Preview</button>
        <button class="btn btn-primary" onclick="promptAgent()">🤖 Agent</button>
      </div>
    </div>
    <div id="session-summary" style="padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:center;font-size:12px">
      <span style="color:var(--text-dim)">Summary:</span>
      <span id="summary-text" style="color:var(--text)">${s.summary ? escHtml(s.summary) : 'No activity yet'}</span>
      <span style="color:var(--text-dim);margin-left:auto">${s.messageCount || 0} messages · ${s.participantCount || 0} people</span>
    </div>
    <div class="agent-progress-bar" id="agent-progress-bar" style="display:none">
      <div class="agent-progress-shimmer"></div>
      <span class="agent-progress-spinner"></span>
      <span class="agent-progress-text">Agent working...</span>
      <button class="agent-progress-stop" onclick="stopAgent()" title="Stop agent">■ Stop</button>
    </div>
    <div id="session-content" style="flex:1;display:flex;min-height:0">
    <div id="split-container" class="split-container">
      <div id="split-left" class="split-left" style="flex:1">
        <div class="chat-area" id="chat-area"></div>
        <div class="input-area">
          <div class="input-box" style="position:relative">
            <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
              <button class="mode-btn ${state.inputMode==='chat'?'active':''}" onclick="setInputMode('chat')" id="mode-chat">💬 Chat</button>
              <button class="mode-btn ${state.inputMode==='ace'?'active':''}" onclick="setInputMode('ace')" id="mode-ace">✦ Agent</button>
              <span style="color:var(--text-dim);font-size:10px;margin-left:4px">Tab to switch</span>
            </div>
            <textarea id="chat-input" placeholder="${state.inputMode==='ace'?'Ask the agent anything...':'Message this session, or type @made to prompt the agent...'}" rows="1" 
              oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';handleAutocompleteInput(event)"
              onkeydown="handleInputKey(event)"></textarea>
            <div class="input-actions">
              <button class="file-attach-btn" onclick="document.getElementById('file-upload-input').click()" title="Attach image">📎</button>
              <input type="file" id="file-upload-input" accept="image/*" style="display:none" onchange="handleFileUpload(this)">
              <select class="model-select" id="model-select">
                <option value="opus">Opus</option>
                <option value="sonnet">Sonnet</option>
                <option value="haiku">Haiku</option>
              </select>
              <button class="send-btn" onclick="sendChat()" title="Send">▶</button>
            </div>
            <div id="autocomplete-dropdown" class="autocomplete-dropdown" style="display:none"></div>
            <div id="upload-preview-area" style="display:none;padding:4px 0"></div>
          </div>
        </div>
      </div>
      <div id="split-handle" class="split-handle"></div>
      <div id="split-right" class="split-right">
        <div class="split-preview-bar" id="split-preview-bar-live">
          <span style="color:var(--text-dim);font-size:12px;white-space:nowrap">👁 Live</span>
          <input class="preview-url" id="preview-url-inline" value="/index.html"
            onkeydown="if(event.key==='Enter'){event.preventDefault();refreshInlinePreview();}">
          <button onclick="refreshInlinePreview()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px" title="Refresh">🔄</button>
          <button onclick="toggleSplit()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px" title="Close preview">✕</button>
        </div>
        <div class="split-preview-bar" id="split-preview-bar-code" style="display:none">
          <span style="color:var(--text-dim);font-size:12px;white-space:nowrap">📄 Source</span>
          <input class="preview-url" id="preview-url-code" value="" readonly style="flex:1">
          <button onclick="showLivePreview()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px" title="Back to live">👁</button>
          <button onclick="toggleSplit()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px" title="Close">✕</button>
        </div>
        <iframe id="preview-frame-inline" class="split-preview-frame"></iframe>
        <div id="preview-code-container" class="preview-code-container" style="display:none;flex:1;overflow:auto;background:#1a1b26"></div>
      </div>
    </div>
    </div>
  `;

  // Render messages
  const chat = document.getElementById('chat-area');
  state.messages[id].forEach(m => appendMessage(m, false));
  chat.scrollTop = chat.scrollHeight;

  // Setup paste handler for image uploads
  setupPasteHandler();
}

function appendMessage(m, scroll = true) {
  const chat = document.getElementById('chat-area');
  if (!chat) return;

  // Skip deleted messages
  if (m.deleted) return;

  const avatarEmoji = {
    system: '⚡', agent: '🤖', terminal: '⌨', image: '🖼',
  }[m.type] || '👤';

  const contentClass = {
    agent_start: '', agent_stream: 'agent', agent_done: '',
    terminal: 'terminal', system: 'system', image: '',
  }[m.type] || '';

  const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const isOwn = m.userId === state.userId && m.type === 'chat';
  const editedBadge = m.editedAt ? '<span style="color:var(--text-dim);font-size:10px;margin-left:4px">(edited)</span>' : '';

  // Determine content rendering: plain text for chat/system, rich for agent/terminal, special for image
  let renderedContent;
  if (m.type === 'image') {
    renderedContent = ''; // built separately below
  } else if (m.type === 'terminal') {
    renderedContent = ''; // Feature 3: built as cmd-card below
  } else if (m.type === 'agent_stream' || m.type === 'agent_done' || m.type === 'agent_start') {
    renderedContent = renderRichContent(m.content || '');
  } else {
    renderedContent = escHtml(m.content);
  }

  const div = document.createElement('div');
  div.className = 'message';
  div.id = 'msg-' + m.id;
  div.innerHTML = `
    <div class="msg-avatar">${avatarEmoji}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name" style="color:${m.type.includes('agent') ? 'var(--accent2)' : m.type === 'system' ? 'var(--text-dim)' : 'var(--text)'}">${escHtml(m.userName)}</span>
        <span class="msg-time">${time}</span>
        ${editedBadge}
        ${isOwn ? `<span class="msg-actions" style="margin-left:8px;display:none">
          <button onclick="editMessage('${m.id}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 4px" title="Edit">✏️</button>
          <button onclick="deleteMessage('${m.id}')" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:11px;padding:0 4px" title="Delete">🗑</button>
        </span>` : ''}
      </div>
      <div class="msg-content ${contentClass}" id="msg-content-${m.id}">${renderedContent}</div>
    </div>
  `;

  // For image messages, build the image element safely
  if (m.type === 'image') {
    const contentEl = div.querySelector('.msg-content');
    contentEl.textContent = '';
    const img = document.createElement('img');
    img.className = 'chat-image';
    img.src = m.content;
    img.alt = m.fileName || 'Uploaded image';
    img.onclick = () => showImageModal(m.content);
    contentEl.appendChild(img);
    const info = document.createElement('div');
    info.className = 'chat-image-info';
    const nameSpan = document.createElement('span');
    nameSpan.textContent = m.fileName || 'image';
    const sizeSpan = document.createElement('span');
    sizeSpan.textContent = formatFileSize(m.fileSize || 0);
    info.appendChild(nameSpan);
    info.appendChild(sizeSpan);
    contentEl.appendChild(info);
  }
  // Feature 3: Build cmd-card for terminal messages
  if (m.type === 'terminal') {
    const contentEl = div.querySelector('.msg-content');
    contentEl.className = ''; // clear terminal class
    contentEl.textContent = '';

    const rawContent = m.content || '';
    const contentLines = rawContent.split('\n');
    const exitCode = m.exitCode !== undefined ? m.exitCode : null;

    // Extract command: first line if it looks like a command, otherwise truncate
    let cmdText = contentLines[0] || '';
    if (cmdText.length > 80) cmdText = cmdText.substring(0, 77) + '...';

    // Determine if we should auto-collapse (>10 lines)
    const shouldCollapse = contentLines.length > 10;

    const cardId = 'cmd-card-' + m.id;

    const card = document.createElement('div');
    card.className = 'cmd-card' + (shouldCollapse ? ' collapsed' : '');
    card.id = cardId;

    // Header
    const header = document.createElement('div');
    header.className = 'cmd-card-header';

    const cmdSpan = document.createElement('span');
    cmdSpan.className = 'cmd-card-cmd';
    cmdSpan.textContent = '$ ' + cmdText;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'cmd-card-copy';
    copyBtn.textContent = '📋';
    copyBtn.title = 'Copy output';
    copyBtn.onclick = function(e) {
      e.stopPropagation();
      navigator.clipboard.writeText(rawContent).catch(() => {});
    };

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'cmd-card-toggle';
    toggleBtn.textContent = shouldCollapse ? '▸' : '▾';
    toggleBtn.title = 'Toggle collapse';
    toggleBtn.onclick = function(e) {
      e.stopPropagation();
      card.classList.toggle('collapsed');
      this.textContent = card.classList.contains('collapsed') ? '▸' : '▾';
    };

    header.appendChild(cmdSpan);
    header.appendChild(copyBtn);
    header.appendChild(toggleBtn);
    card.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'cmd-card-body';
    body.textContent = rawContent;
    card.appendChild(body);

    // Footer with expand button and exit badge
    const footer = document.createElement('div');
    footer.className = 'cmd-card-footer';

    if (shouldCollapse) {
      const expandBtn = document.createElement('button');
      expandBtn.className = 'cmd-card-expand';
      expandBtn.textContent = 'Show more (' + contentLines.length + ' lines)';
      expandBtn.onclick = function(e) {
        e.stopPropagation();
        card.classList.remove('collapsed');
        toggleBtn.textContent = '▾';
        this.style.display = 'none';
      };
      footer.appendChild(expandBtn);
    }

    if (exitCode !== null) {
      const badge = document.createElement('span');
      badge.className = 'exit-badge ' + (exitCode === 0 ? 'success' : 'error');
      badge.textContent = (exitCode === 0 ? '✓ 0' : '✗ ' + exitCode);
      footer.appendChild(badge);
    }

    if (footer.children.length > 0) {
      card.appendChild(footer);
    }

    contentEl.appendChild(card);
  }
  // Show edit/delete on hover
  if (isOwn) {
    div.addEventListener('mouseenter', () => { const a = div.querySelector('.msg-actions'); if(a) a.style.display = 'inline'; });
    div.addEventListener('mouseleave', () => { const a = div.querySelector('.msg-actions'); if(a) a.style.display = 'none'; });
  }
  chat.appendChild(div);

// ─── Diff Renderer ─────────────────────────────────────────
function renderDiffContent(content) {
  const lines = content.split('\n');
  let inDiff = false;
  let result = '';
  let diffBuffer = [];

  function flushDiff() {
    if (diffBuffer.length === 0) return;
    const container = document.createElement('div');
    container.className = 'diff-block';
    for (const line of diffBuffer) {
      const el = document.createElement('div');
      if (line.startsWith('+++ ') || line.startsWith('--- ')) {
        el.className = 'diff-header';
        const fileName = escHtml(line.slice(4).replace('a/', '').replace('b/', ''));
        const badge = line.startsWith('+++ ') ? '<span class="file-badge">modified</span>' : '';
        el.innerHTML = escHtml(line.slice(0, 4)) + fileName + badge;
      } else if (line.startsWith('@@')) {
        el.className = 'diff-hunk';
        el.textContent = line;
      } else if (line.startsWith('+')) {
        el.className = 'diff-add';
        el.textContent = line;
      } else if (line.startsWith('-')) {
        el.className = 'diff-remove';
        el.textContent = line;
      } else {
        el.className = 'diff-context';
        el.textContent = line;
      }
      container.appendChild(el);
    }
    result += container.outerHTML;
    diffBuffer = [];
  }

  for (const line of lines) {
    // Detect start of a diff block
    if (line.startsWith('diff --git') || line.startsWith('--- ') || line.startsWith('+++ ')) {
      if (!inDiff) {
        // Flush any previous non-diff content
        flushDiff();
        inDiff = true;
      }
      diffBuffer.push(line);
    } else if (inDiff && (line.startsWith('+') || line.startsWith('-') || line.startsWith('@') || line.startsWith(' ') || line === '')) {
      diffBuffer.push(line);
    } else {
      if (inDiff) {
        flushDiff();
        inDiff = false;
      }
      // Non-diff line
      result += escHtml(line) + '\n';
    }
  }
  flushDiff();
  return result || escHtml(content);
}

function isDiffContent(content) {
  if (!content) return false;
  return content.includes('diff --git') || (/^--- .*\n\+\+\+ /m.test(content)) || (content.split('\n').filter(l => l.startsWith('+') || l.startsWith('-')).length > 3);
}

// ─── Rich Content Renderer ──────────────────────────────────
function renderRichContent(content) {
  if (!content) return '';
  // Step 1: Check for code blocks (```)
  if (content.includes('```')) {
    return renderCodeBlocks(content);
  }
  // Step 2: Check for diff content
  if (isDiffContent(content)) {
    return renderDiffContent(content);
  }
  // Step 3: Render inline — URLs, @mentions, then plain text
  return renderInlineContent(content);
}

function renderCodeBlocks(content) {
  // Split by ``` markers
  const parts = content.split('```');
  let result = '';
  for (let i = 0; i < parts.length; i++) {
    if (i % 2 === 0) {
      // Outside code block — render inline
      result += renderInlineContent(parts[i]);
    } else {
      // Inside code block
      const lines = parts[i].split('\n');
      const firstLine = lines[0].trim();
      const code = lines.slice(firstLine && !firstLine.includes(' ') ? 1 : 0).join('\n');
      const lang = firstLine && !firstLine.includes(' ') ? firstLine : '';
      const block = document.createElement('div');
      block.className = 'code-block';
      if (lang) {
        const langBadge = document.createElement('div');
        langBadge.className = 'code-lang';
        langBadge.textContent = lang;
        block.appendChild(langBadge);
      }
      const pre = document.createElement('pre');
      pre.style.cssText = 'margin:0;white-space:pre-wrap;word-break:break-all;';
      pre.textContent = code;
      block.appendChild(pre);
      result += block.outerHTML;
    }
  }
  return result;
}

function renderInlineContent(content) {
  // Process line by line for diff detection within mixed content
  let html = escHtml(content);
  // File path patterns: path/to/file.ext:line or src/foo.mjs etc.
  html = html.replace(/(?:^|[\s(])([\w./-]+\.[\w]+)(?::(\d+))?(?=[\s),.]|$)/gm, function(match, path, line) {
    // Skip URLs
    if (path.match(/^(https?|ftp|mailto):/i)) return match;
    // Only match plausible file paths (must contain / or known extension)
    const exts = /\.(js|jsx|ts|tsx|mjs|cjs|py|html|css|json|md|yaml|yml|toml|sh|bash|zsh|rs|go|rb|java|c|cpp|h|hpp|vue|svelte|sql|txt|cfg|conf|ini|env|gitignore|dockerfile|makefile|lock|svg|xml|graphql|gql|prisma|wasm|bat|ps1|php|swift|kt|dart|lua|r|pl|ex|exs|hs|elm|clj|scala|cl$/i;
    if (!path.includes('/') && !exts.test(path)) return match;
    // Skip common non-file words
    const skip = ['the','and','for','not','you','are','can','has','was','will','but','this','that','with','from','they','been','have','were','said','each','which','their','would','there','could','other','than','into','more','about','up','out','many','then','them','these','some','her','would','make','like','time','very','when','come','could','no','just','know','take','people','year','your','good','some','also','look','only','come','think','back','after','work','first','well'];
    if (skip.includes(path.toLowerCase())) return match;
    const lineArg = line ? ':' + line : '';
    return match.replace(path + (line ? ':' + line : ''), '<a href="javascript:void(0)" onclick="openFilePreview(\'' + path + '\')" class="file-path-link" title="Click to preview">' + path + lineArg + '</a>');
  });
  // URLs → clickable links
  html = html.replace(/(https?:\/\/[^\s<>"')\]]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // @mentions → highlighted
  html = html.replace(/@(\w[\w.-]*)/g, '<span class="mention-highlight">@$1</span>');
  return html;
}

// Autocomplete state
let _acState = { active: false, items: [], index: -1, trigger: '', triggerStart: 0 };
const COMMANDS = [
  { cmd: '/agent', desc: 'Send prompt to agent', icon: '🤖' },
  { cmd: '/plan', desc: 'Switch to plan tab', icon: '📋' },
  { cmd: '/commit', desc: 'Open commit dialog', icon: '💾' },
  { cmd: '/run', desc: 'Execute in terminal', icon: '⌨' },
  { cmd: '/clear', desc: 'Clear chat messages', icon: '🗑' },
];

function handleInputKey(e) {
  const input = document.getElementById('chat-input');
  if (!input) return;

  // Autocomplete navigation
  if (_acState.active) {
    if (e.key === 'ArrowDown') { e.preventDefault(); _acState.index = Math.min(_acState.index + 1, _acState.items.length - 1); renderAutocomplete(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); _acState.index = Math.max(_acState.index - 1, 0); renderAutocomplete(); return; }
    if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); selectAutocompleteItem(); return; }
    if (e.key === 'Escape') { e.preventDefault(); hideAutocomplete(); return; }
  }

  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  if (e.key === 'Tab' && !_acState.active) { e.preventDefault(); setInputMode(state.inputMode === 'chat' ? 'ace' : 'chat'); }
}

// ─── Autocomplete System ────────────────────────────────
function handleAutocompleteInput(e) {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value;
  const cursorPos = input.selectionStart;

  // Find the current "word" being typed
  const textBeforeCursor = text.slice(0, cursorPos);
  const wordMatch = textBeforeCursor.match(/([@#\/+])(\w*)$/);

  if (!wordMatch) {
    // Check for + at exact position (trigger file upload)
    if (textBeforeCursor.endsWith('+') && (textBeforeCursor.length === 1 || textBeforeCursor[textBeforeCursor.length - 2] === ' ' || textBeforeCursor[textBeforeCursor.length - 2] === '\n')) {
      // Don't show dropdown, just trigger upload on next keystroke if desired
      hideAutocomplete();
      return;
    }
    hideAutocomplete();
    return;
  }

  const trigger = wordMatch[1];
  const query = wordMatch[2].toLowerCase();
  const triggerStart = cursorPos - trigger.length - query.length;

  let items = [];

  if (trigger === '@') {
    // Show users
    fetchUsers().then(users => {
      items = users.filter(u => u.name.toLowerCase().includes(query)).map(u => ({
        label: u.name, value: u.name, icon: '👤', hint: 'user',
      }));
      showAutocomplete(items, trigger, triggerStart);
    });
    return;
  }

  if (trigger === '#') {
    items = (state.sessions || []).filter(s => s.name.toLowerCase().includes(query)).map(s => ({
      label: s.name, value: s.id, icon: '📝', hint: 'session',
    }));
    showAutocomplete(items, trigger, triggerStart);
    return;
  }

  if (trigger === '/') {
    // Only at start of line
    const lineStart = textBeforeCursor.lastIndexOf('\n') + 1;
    if (triggerStart !== lineStart) { hideAutocomplete(); return; }
    items = COMMANDS.filter(c => c.cmd.includes(query)).map(c => ({
      label: c.cmd, value: c.cmd, icon: c.icon, hint: c.desc,
    }));
    showAutocomplete(items, trigger, triggerStart);
    return;
  }

  hideAutocomplete();
}

async function fetchUsers() {
  try {
    const data = await api('/api/users');
    return data.users || [];
  } catch { return []; }
}

function showAutocomplete(items, trigger, triggerStart) {
  if (items.length === 0) { hideAutocomplete(); return; }
  _acState = { active: true, items, index: 0, trigger, triggerStart };
  renderAutocomplete();
}

function hideAutocomplete() {
  _acState.active = false;
  _acState.items = [];
  _acState.index = -1;
  const dd = document.getElementById('autocomplete-dropdown');
  if (dd) dd.style.display = 'none';
}

function renderAutocomplete() {
  const dd = document.getElementById('autocomplete-dropdown');
  if (!dd || !_acState.active) return;
  dd.style.display = 'block';
  dd.innerHTML = _acState.items.map((item, i) =>
    `<div class="autocomplete-item ${i === _acState.index ? 'active' : ''}" onmousedown="event.preventDefault();_acState.index=${i};selectAutocompleteItem()" onmouseover="_acState.index=${i};renderAutocomplete()">` +
    `<span class="ac-icon">${item.icon}</span><span class="ac-label">${escHtml(item.label)}</span><span class="ac-hint">${escHtml(item.hint || '')}</span></div>`
  ).join('');
}

function selectAutocompleteItem() {
  const input = document.getElementById('chat-input');
  if (!input || !_acState.active || _acState.items.length === 0) return;
  const item = _acState.items[_acState.index];
  if (!item) return;

  const trigger = _acState.trigger;
  const text = input.value;
  const cursorPos = input.selectionStart;
  const textBeforeCursor = text.slice(0, cursorPos);
  const wordMatch = textBeforeCursor.match(new RegExp('\\' + trigger + '\\w*$'));
  if (!wordMatch) { hideAutocomplete(); return; }

  const replaceStart = cursorPos - wordMatch[0].length;
  let insertText;

  if (trigger === '/') {
    // Commands: replace the whole line and execute
    insertText = item.value + ' ';
    input.value = text.slice(0, replaceStart) + insertText + text.slice(cursorPos);
    input.selectionStart = input.selectionEnd = replaceStart + insertText.length;
    hideAutocomplete();
    input.focus();
    // Execute command immediately for non-parameterized commands
    if (item.value === '/plan') { switchTab('plan'); input.value = ''; }
    else if (item.value === '/commit') { gitCommit(); input.value = ''; }
    else if (item.value === '/clear') { clearChat(); input.value = ''; }
    return;
  }

  if (trigger === '@') {
    insertText = trigger + item.value + ' ';
  } else if (trigger === '#') {
    insertText = trigger + item.label + ' ';
  } else {
    insertText = item.value;
  }

  input.value = text.slice(0, replaceStart) + insertText + text.slice(cursorPos);
  input.selectionStart = input.selectionEnd = replaceStart + insertText.length;
  hideAutocomplete();
  input.focus();
}

function handleFileUpload(inputEl) {
  const file = inputEl.files?.[0];
  if (!file || !state.activeSession) return;
  uploadFile(file);
  inputEl.value = '';
}

async function uploadFile(file) {
  if (!state.activeSession) return;
  // Validate type
  const allowed = ['image/png', 'image/jpeg', 'image/gif', 'image/webp', 'image/svg+xml'];
  if (!allowed.includes(file.type)) {
    alert('Only image files are supported (PNG, JPG, GIF, WebP, SVG)');
    return;
  }
  // Validate size (5MB)
  if (file.size > 5 * 1024 * 1024) {
    alert('File too large. Maximum size is 5MB.');
    return;
  }

  // Show preview
  const previewArea = document.getElementById('upload-preview-area');
  if (previewArea) {
    previewArea.style.display = 'block';
    const thumb = document.createElement('img');
    thumb.className = 'upload-preview uploading';
    thumb.src = URL.createObjectURL(file);
    previewArea.innerHTML = '';
    previewArea.appendChild(thumb);
  }

  try {
    const formData = new FormData();
    formData.append('file', file);
    const r = await fetch(`${API}/api/sessions/${state.activeSession}/upload?userId=${state.userId}`, {
      method: 'POST',
      body: formData,
    });
    if (!r.ok) {
      const err = await r.json();
      alert('Upload failed: ' + (err.error || r.statusText));
    }
  } catch (err) {
    alert('Upload failed: ' + err.message);
  }

  // Clear preview
  if (previewArea) {
    previewArea.style.display = 'none';
    previewArea.innerHTML = '';
  }
}

function setupPasteHandler() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  input.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file && state.activeSession) uploadFile(file);
        return;
      }
    }
  });
}

  if (chatBtn) chatBtn.className = 'mode-btn' + (mode === 'chat' ? ' active' : '');
  if (aceBtn) aceBtn.className = 'mode-btn' + (mode === 'ace' ? ' active' : '');

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !state.activeSession) return;

  // In Agent mode, everything goes to the agent
  if (state.inputMode === 'ace') {
    promptAgentWithText(text);
    input.value = '';
    input.style.height = 'auto';
    return;
  }

  // Chat mode: /agent sends to agent, @made triggers agent
  if (text.startsWith('/agent ')) {
    const prompt = text.slice(7);
    promptAgentWithText(prompt);
    input.value = '';
    input.style.height = 'auto';
    return;
  }
  if (text.startsWith('/run ')) {
    const cmd = text.slice(5);
    api(`/api/sessions/${state.activeSession}/exec`, {
      method: 'POST',
      body: JSON.stringify({ command: cmd, userId: state.userId }),
    });
    input.value = '';
    input.style.height = 'auto';
    return;
  }

  // Regular chat
  const model = document.getElementById('model-select')?.value || 'opus';
  state.ws.send(JSON.stringify({
    type: 'chat', sessionId: state.activeSession, userId: state.userId,
    userName: state.userName, content: text, model,
  }));
  input.value = '';
  input.style.height = 'auto';
}

      feedEl.innerHTML = '<p style="color:var(--text-dim);font-size:13px;padding:8px">No activity in the last 24 hours.</p>';

      feedEl.innerHTML = activity.map(a => {

// ─── Terminal WebSocket ──────────────────────────────────
function connectTerminal() {
  if (state.termWs) { state.termWs.close(); state.termWs = null; }
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/term/${state.activeSession}`);
  state.termWs = ws;
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'output') {
        const out = document.getElementById('term-output');
        if (out) {
          // Strip ANSI escape codes for clean display
          const clean = msg.data.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '').replace(/\x1b\].*?\x07/g, '').replace(/\r/g, '');
          const line = document.createElement('div');
          line.className = 'term-line';
          line.textContent = clean;
          out.appendChild(line);
          out.scrollTop = out.scrollHeight;

          // Auto-detect dev server ports
          const portMatch = clean.match(/(?:localhost|127\.0\.0\.1|0\.0\.0\.0):(\d{2,5})/);
          if (portMatch) {
            const port = portMatch[1];
            const previewUrl = document.getElementById('preview-url');
            const previewUrlInline = document.getElementById('preview-url-inline');
            if (previewUrl) previewUrl.value = `http://localhost:${port}`;
            if (previewUrlInline) previewUrlInline.value = `http://localhost:${port}`;
            // Show notification
            showPortNotification(port);
          }
        }
      }
      if (msg.type === 'exit') {
        const out = document.getElementById('term-output');
        if (out) {
          const line = document.createElement('div');
          line.className = 'term-line';
          line.style.color = 'var(--text-dim)';
          line.textContent = `\nProcess exited with code ${msg.exitCode}`;
          out.appendChild(line);
        }
      }
    } catch {}
  };
  const input = document.getElementById('term-input');
  if (input) {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data: input.value + '\r' }));
        input.value = '';
      }
      // Send Ctrl+C on Ctrl+C
      if (e.key === 'c' && e.ctrlKey) {
        if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data: '\x03' }));
      }
    });
    input.focus();
  }
  // Send terminal resize to PTY
  if (ws.readyState === 1) {
    const termBody = document.getElementById('term-output');
    if (termBody) {
      const cols = Math.floor(termBody.clientWidth / 8) || 80;
      const rows = Math.floor(termBody.clientHeight / 16) || 24;
      ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    }
  }
}

// ─── File Browser ────────────────────────────────────────
async function loadFiles(dirPath) {
  const tree = document.getElementById('file-tree');
  if (!tree || !state.activeSession) return;
  try {
    const data = await api(`/api/sessions/${state.activeSession}/files${dirPath}`);
    let html = `<div style="margin-bottom:12px;color:var(--text-dim);font-size:13px;cursor:pointer" onclick="loadFiles('/')">📁 /</div>`;
    if (dirPath !== '/') {
      const parent = dirPath.split('/').slice(0, -1).join('/') || '/';
      html += `<div style="margin-bottom:8px;cursor:pointer;font-size:13px" onclick="loadFiles('${parent}')">↩ ..</div>`;
    }
    for (const entry of data.entries || []) {
      const icon = entry.type === 'dir' ? '📁' : '📄';
      const size = entry.type === 'file' ? `(${(entry.size/1024).toFixed(1)}KB)` : '';
      const click = entry.type === 'dir' 
        ? `onclick="loadFiles('${dirPath === '/' ? '' : dirPath}/${entry.name}')"`
        : `onclick="viewFile('${dirPath === '/' ? '' : dirPath}/${entry.name}')"`;
      html += `<div style="padding:4px 0;font-size:13px;cursor:pointer;${click ? '' : ''}" ${click}>${icon} ${entry.name} <span style="color:var(--text-dim)">${size}</span></div>`;
    }
    tree.innerHTML = html;
  } catch (err) {
    tree.innerHTML = `<p style="color:var(--text-dim)">No files yet. Run the agent to create some!</p>`;
  }
}

async function viewFile(filePath) {
  const content = await fetch(`/api/sessions/${state.activeSession}/files${filePath}`);
  const text = await content.text();
  const tree = document.getElementById('file-tree');
  tree.innerHTML = `<div style="cursor:pointer;color:var(--text-dim);font-size:13px;margin-bottom:8px" onclick="loadFiles('/')">← Back to files</div><pre style="font-family:var(--mono);font-size:12px;overflow-x:auto;padding:8px;background:var(--surface2);border-radius:6px">${escHtml(text)}</pre>`;
}

function autoSavePlan() {
  if (planAutoSave) clearTimeout(planAutoSave);
  const statusEl = document.getElementById('plan-status');
  if (statusEl) statusEl.textContent = 'Editing...';
  // Broadcast typing awareness
  if (state.ws?.readyState === 1 && state.activeSession) {
    state.ws.send(JSON.stringify({ type: 'plan_typing', sessionId: state.activeSession, userId: state.userId, userName: state.userName }));
  }
  planAutoSave = setTimeout(() => savePlan(), 3000);
}

let _planUpdatedAt = null;
async function savePlan() {
  const editor = document.getElementById('plan-editor');
  if (!editor || !state.activeSession) return;
  const content = editor.value;
  try {
    const result = await api(`/api/sessions/${state.activeSession}/plan`, {
      method: 'POST',
      body: JSON.stringify({ content, userId: state.userId, title: 'Plan', updatedAt: _planUpdatedAt }),
    });
    _planUpdatedAt = result.plan?.updatedAt;
    const statusEl = document.getElementById('plan-status');
    if (statusEl) statusEl.textContent = 'Saved ✓';
  } catch (err) {
    const statusEl = document.getElementById('plan-status');
    if (err.message && err.message.includes('409')) {
      if (statusEl) statusEl.textContent = '⚠ Conflict! Someone else edited. Refreshing...';
      setTimeout(() => loadPlan(), 1500);
    } else {
      if (statusEl) statusEl.textContent = 'Save failed: ' + err.message;
    }
  }
}

async function generatePlan() {
  if (!state.activeSession) return;
  const prompt = promptForInput('What should the plan cover?') || 'Create a detailed plan';
  await api(`/api/sessions/${state.activeSession}/plan/generate`, {
    method: 'POST',
    body: JSON.stringify({ prompt, userId: state.userId }),
  });
  alert('Agent is generating a plan. Check the chat for output, then paste it here.');
}

async function deletePlan() {
  if (!state.activeSession || !confirm('Delete this plan?')) return;
  await api(`/api/sessions/${state.activeSession}/plan`, { method: 'DELETE' });
  loadPlan();
}

async function executePlan() {
  await savePlan();
  // Send @made do this to chat
  if (state.ws?.readyState === 1 && state.activeSession) {
    state.ws.send(JSON.stringify({
      type: 'chat', sessionId: state.activeSession, userId: state.userId,
      userName: state.userName, content: '@made do this',
    }));
  }
  switchTab('chat');
}

  const el = document.createElement('div');
  return window.prompt(msg);
}

  }
  notif.innerHTML = `🔌 Dev server detected on port <strong style="color:var(--accent)">${port}</strong><br><button onclick="toggleSplit();updatePortNotificationForSplit('${port}');document.getElementById('port-notification').style.display='none'" style="margin-top:6px;padding:4px 12px;background:var(--accent);color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px">Open Preview</button>`;
  notif.style.display = 'block';
  notif.style.opacity = '1';
  clearTimeout(window._portNotifTimeout);
  window._portNotifTimeout = setTimeout(() => { if (notif) { notif.style.opacity = '0'; setTimeout(() => notif.style.display = 'none', 300); } }, 8000);
}

// ─── Summary Auto-Update ────────────────────────────────
// When agent finishes, update summary bar
function updateSessionSummary(sessionData) {
  const summaryText = document.getElementById('summary-text');
  if (summaryText && sessionData.summary) {
    summaryText.textContent = sessionData.summary;
  }
}

// ─── Feature A: Split View (side-by-side live preview) ────
let splitOpen = false;
let splitRatio = 0.6; // 60% chat, 40% preview

function toggleSplit() {
  splitOpen = !splitOpen;
  const right = document.getElementById('split-right');
  const handle = document.getElementById('split-handle');
  const btn = document.getElementById('btn-split-preview');
  if (!right || !handle) return;

  if (splitOpen) {
    right.classList.add('open');
    handle.style.display = 'block';
    if (btn) btn.classList.add('preview-active');
    refreshInlinePreview();
  } else {
    right.classList.remove('open');
    handle.style.display = 'none';
    if (btn) btn.classList.remove('preview-active');
  }
  updateSplitRatio();
}

function updateSplitRatio() {
  const left = document.getElementById('split-left');
  const right = document.getElementById('split-right');
  if (left) left.style.flex = splitRatio;
  if (right) right.style.flex = 1 - splitRatio;
}

function refreshInlinePreview() {
  const frame = document.getElementById('preview-frame-inline');
  const urlInput = document.getElementById('preview-url-inline');
  if (!frame || !state.activeSession) return;
  const filePath = urlInput?.value || '/index.html';
  frame.src = `/api/sessions/${state.activeSession}/preview${filePath}`;
}

// Drag handle for resizing split
(function initSplitDrag() {
  let dragging = false;
  let startX = 0;
  let startRatio = 0;

  document.addEventListener('mousedown', (e) => {
    const handle = document.getElementById('split-handle');
    if (!handle || e.target !== handle) return;
    dragging = true;
    startX = e.clientX;
    startRatio = splitRatio;
    handle.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const container = document.getElementById('split-container');
    if (!container) return;
    const totalWidth = container.clientWidth;
    const dx = e.clientX - startX;
    const newRatio = startRatio + dx / totalWidth;
    splitRatio = Math.min(0.85, Math.max(0.2, newRatio));
    updateSplitRatio();
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    const handle = document.getElementById('split-handle');
    if (handle) handle.classList.remove('dragging');
  });
})();

// Update port notification to use inline split instead of tab
function updatePortNotificationForSplit(port) {
  const urlInput = document.getElementById('preview-url-inline');
  if (urlInput) {
    urlInput.value = `http://localhost:${port}`;
  }
  if (splitOpen) {
    refreshInlinePreview();
  }
}

// ─── Feature B: Inline Diff Cards ────────────────────────
async function fetchAndRenderDiffCard(sessionId) {
  try {
    const data = await api(`/api/sessions/${sessionId}/git/diff`);
    if (!data.diff || data.diff.trim() === '') return; // no changes

    const parsed = parseGitDiff(data.diff);
    if (parsed.files.length === 0) return;

    const chat = document.getElementById('chat-area');
    if (!chat) return;

    const card = document.createElement('div');
    card.className = 'diff-card';
    card.onclick = function(e) {
      // Don't toggle if clicking inside the detail scroll area
      if (e.target.closest('.diff-card-detail')) return;
      this.classList.toggle('expanded');
    };

    // Summary header
    const header = document.createElement('div');
    header.className = 'diff-card-header';

    const icon = document.createElement('span');
    icon.className = 'diff-card-icon';
    icon.textContent = '📝';

    const summary = document.createElement('span');
    summary.className = 'diff-card-summary';
    summary.textContent = `${parsed.files.length} file${parsed.files.length !== 1 ? 's' : ''} changed`;

    const stats = document.createElement('span');
    stats.className = 'diff-card-stats';
    const addSpan = document.createElement('span');
    addSpan.style.color = 'var(--green)';
    addSpan.textContent = `+${parsed.totalAdd}`;
    const delSpan = document.createElement('span');
    delSpan.style.color = 'var(--red)';
    delSpan.textContent = ` -${parsed.totalDel}`;
    stats.appendChild(addSpan);
    stats.appendChild(delSpan);

    const toggle = document.createElement('span');
    toggle.className = 'diff-card-toggle';

    header.appendChild(icon);
    header.appendChild(summary);
    header.appendChild(stats);
    header.appendChild(toggle);
    card.appendChild(header);

    // File list
    const filesDiv = document.createElement('div');
    filesDiv.className = 'diff-card-files';
    for (const f of parsed.files) {
      const line = document.createElement('div');
      line.className = 'diff-file-line';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'diff-file-name clickable-file';
      nameSpan.textContent = '📄 ' + f.name;
      nameSpan.title = 'Click to preview file';
      nameSpan.onclick = function(e) {
        e.stopPropagation();
        openFilePreview(f.name);
      };

      const addS = document.createElement('span');
      addS.className = 'diff-file-add';
      addS.textContent = '+' + f.adds;

      const delS = document.createElement('span');
      delS.className = 'diff-file-del';
      delS.textContent = '-' + f.dels;

      line.appendChild(nameSpan);
      line.appendChild(addS);
      line.appendChild(delS);
      filesDiv.appendChild(line);
    }
    card.appendChild(filesDiv);

    // Full diff detail
    const detail = document.createElement('div');
    detail.className = 'diff-card-detail';
    const diffLines = data.diff.split('\n');
    for (const rawLine of diffLines) {
      const el = document.createElement('div');
      if (rawLine.startsWith('diff --git') || rawLine.startsWith('--- ') || rawLine.startsWith('+++ ')) {
        el.className = 'diff-header-line';
      } else if (rawLine.startsWith('@@')) {
        el.className = 'diff-hunk';
      } else if (rawLine.startsWith('+')) {
        el.className = 'diff-add';
      } else if (rawLine.startsWith('-')) {
        el.className = 'diff-remove';
      } else {
        el.className = 'diff-context';
      }
      el.textContent = rawLine;
      detail.appendChild(el);
    }
    card.appendChild(detail);

    // Add a wrapper message for the diff card
    const wrapper = document.createElement('div');
    wrapper.className = 'message';
    wrapper.innerHTML = `
      <div class="msg-avatar">📝</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name" style="color:var(--text-dim)">Changes</span>
          <span class="msg-time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
      </div>
    `;
    const msgBody = wrapper.querySelector('.msg-body');
    msgBody.appendChild(card);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
  } catch (err) {
    console.warn('Failed to fetch diff card:', err);
  }
}

function parseGitDiff(diffText) {
  const files = [];
  let totalAdd = 0;
  let totalDel = 0;
  let currentFile = null;
  let currentAdds = 0;
  let currentDels = 0;

  const lines = diffText.split('\n');
  for (const line of lines) {
    // Detect file name from +++ b/filename lines
    const fileMatch = line.match(/^\+\+\+ b\/(.+)$/);
    if (fileMatch) {
      if (currentFile) {
        files.push({ name: currentFile, adds: currentAdds, dels: currentDels });
      }
      currentFile = fileMatch[1];
      currentAdds = 0;
      currentDels = 0;
      continue;
    }
    // Count adds/dels (skip +++ and --- lines)
    if (line.startsWith('+') && !line.startsWith('+++')) {
      currentAdds++;
      totalAdd++;
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      currentDels++;
      totalDel++;
    }
  }
  if (currentFile) {
    files.push({ name: currentFile, adds: currentAdds, dels: currentDels });
  }
  return { files, totalAdd, totalDel };
}

// ─── Feature 1: File Preview in Split Panel ──────────────
async function openFilePreview(path) {
  if (!state.activeSession) return;
  // Ensure split is open
  if (!splitOpen) toggleSplit();
  
  try {
    const response = await fetch(`${API}/api/sessions/${state.activeSession}/files?path=/${path.replace(/^\//, '')}`);
    const content = await response.text();
    
    // Switch to code mode
    const liveBar = document.getElementById('split-preview-bar-live');
    const codeBar = document.getElementById('split-preview-bar-code');
    const iframe = document.getElementById('preview-frame-inline');
    const codeContainer = document.getElementById('preview-code-container');
    const urlInput = document.getElementById('preview-url-code');
    
    if (liveBar) liveBar.style.display = 'none';
    if (codeBar) codeBar.style.display = 'flex';
    if (iframe) iframe.style.display = 'none';
    if (codeContainer) codeContainer.style.display = 'block';
    if (urlInput) urlInput.value = path;
    
    // Detect language from extension
    const ext = path.split('.').pop().toLowerCase();
    const langMap = {
      js: 'javascript', jsx: 'javascript', mjs: 'javascript', cjs: 'javascript',
      ts: 'typescript', tsx: 'typescript',
      py: 'python', rb: 'ruby', rs: 'rust', go: 'go', java: 'java',
      html: 'html', css: 'css', json: 'json', yaml: 'yaml', yml: 'yaml',
      md: 'markdown', sql: 'sql', sh: 'bash', bash: 'bash', zsh: 'bash',
      c: 'c', cpp: 'cpp', h: 'c', hpp: 'cpp',
      vue: 'html', svelte: 'html', xml: 'xml', svg: 'xml',
      toml: 'toml', conf: 'conf', cfg: 'conf', ini: 'ini',
      txt: 'text', env: 'env', lock: 'json',
    };
    const lang = langMap[ext] || 'text';
    
    // Build highlighted code with line numbers
    const lines = content.split('\n');
    let codeHtml = '<div class="code-preview-lang">' + escHtml(lang) + '</div>';
    codeHtml += '<table class="code-preview-table"><tbody>';
    for (let i = 0; i < lines.length; i++) {
      const lineNum = i + 1;
      const highlighted = highlightSyntax(escHtml(lines[i]), lang);
      codeHtml += `<tr class="code-preview-line"><td class="code-preview-linenum">${lineNum}</td><td class="code-preview-code">${highlighted}</td></tr>`;
    }
    codeHtml += '</tbody></table>';
    
    if (codeContainer) {
      codeContainer.innerHTML = codeHtml;
    }
  } catch (err) {
    console.error('Failed to open file preview:', err);
  }
}

function highlightSyntax(line, lang) {
  // Comments
  if (lang === 'python' || lang === 'bash' || lang === 'toml') {
    line = line.replace(/(#[^\n]*)/g, '<span class="hl-comment">$1</span>');
  } else if (lang === 'html' || lang === 'xml' || lang === 'markdown') {
    line = line.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="hl-comment">$1</span>');
  } else {
    line = line.replace(/(\/\/[^\n]*)/g, '<span class="hl-comment">$1</span>');
    line = line.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="hl-comment">$1</span>');
  }
  // Strings
  line = line.replace(/(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;|`[^`]*?`)/g, '<span class="hl-string">$1</span>');
  // Numbers
  line = line.replace(/\b(\d+\.?\d*)\b/g, '<span class="hl-number">$1</span>');
  // Keywords (JS/TS/Java/C/C++)
  const jsKeywords = /\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|new|class|extends|import|export|default|from|async|await|try|catch|finally|throw|typeof|instanceof|in|of|null|undefined|true|false|this|super|yield|static|get|set|void|delete)\b/g;
  const pyKeywords = /\b(def|class|return|if|elif|else|for|while|break|continue|import|from|as|try|except|finally|raise|with|lambda|yield|pass|assert|del|in|not|and|or|is|None|True|False|self|global|nonlocal|async|await)\b/g;
  const cssKeywords = /\b(display|flex|grid|position|margin|padding|border|color|background|font|width|height|top|left|right|bottom|z-index|overflow|transition|animation|transform|opacity|box-shadow|border-radius|none|auto|inherit|initial|important|relative|absolute|fixed|sticky|block|inline|center|space-between|column|row|wrap|hidden|visible|pointer|solid|dashed|none)\b/g;
  
  if (['javascript','typescript'].includes(lang)) {
    line = line.replace(jsKeywords, '<span class="hl-keyword">$1</span>');
  } else if (lang === 'python') {
    line = line.replace(pyKeywords, '<span class="hl-keyword">$1</span>');
  } else if (lang === 'css') {
    line = line.replace(cssKeywords, '<span class="hl-keyword">$1</span>');
  } else if (lang === 'html' || lang === 'xml') {
    line = line.replace(/\b(\w+)=/g, '<span class="hl-keyword">$1</span>=');
    line = line.replace(/(&lt;\/?)([\w-]+)/g, '$1<span class="hl-keyword">$2</span>');
  }
  return line;
}

function showLivePreview() {
  const liveBar = document.getElementById('split-preview-bar-live');
  const codeBar = document.getElementById('split-preview-bar-code');
  const iframe = document.getElementById('preview-frame-inline');
  const codeContainer = document.getElementById('preview-code-container');
  
  if (liveBar) liveBar.style.display = 'flex';
  if (codeBar) codeBar.style.display = 'none';
  if (iframe) iframe.style.display = 'block';
  if (codeContainer) codeContainer.style.display = 'none';
  
  refreshInlinePreview();
}

// ─── Feature 2: Agent Progress Bar ───────────────────────
function showAgentProgress() {
  const bar = document.getElementById('agent-progress-bar');
  if (bar) {
    bar.style.display = 'flex';
    bar.classList.add('visible');
  }
}

function updateAgentProgress(text) {
  const el = document.querySelector('.agent-progress-text');
  if (el && text) {
    // Show a truncated preview of the latest stream content
    const snippet = text.length > 60 ? text.substring(0, 60) + '...' : text;
    el.textContent = snippet || 'Agent working...';
  }
}

function hideAgentProgress() {
  const bar = document.getElementById('agent-progress-bar');
  if (bar) {
    bar.classList.remove('visible');
    setTimeout(() => { bar.style.display = 'none'; }, 1000);
  }
}

async function stopAgent() {
  if (!state.activeSession) return;
  try {
    await api(`/api/sessions/${state.activeSession}/exec/abort`, { method: 'POST' });
    hideAgentProgress();
  } catch (err) {
    console.error('Failed to stop agent:', err);
  }
}
